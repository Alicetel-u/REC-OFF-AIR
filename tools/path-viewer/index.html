<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>イベントパスビューア</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#e0e0e0; font-family:'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; }

#sidebar { width:340px; background:#16213e; border-right:1px solid #333; display:flex; flex-direction:column; flex-shrink:0; }
#sidebar h1 { font-size:15px; padding:10px; background:#0f3460; text-align:center; }
#controls { padding:8px; display:flex; flex-direction:column; gap:6px; }
#controls label { font-size:12px; color:#aaa; }
#controls select, #controls button, #controls input[type=file] {
  padding:5px 8px; border:1px solid #444; border-radius:4px; background:#1a1a2e; color:#e0e0e0; font-size:12px; cursor:pointer;
}
#controls button { background:#0f3460; border-color:#1a73e8; }
#controls button:hover { background:#1a73e8; }
.btn-row { display:flex; gap:4px; flex-wrap:wrap; }

/* 選択地点パネル */
#pick-panel { padding:8px; background:#0d1b2a; border-top:1px solid #333; border-bottom:1px solid #333; }
#pick-panel.hidden { display:none; }
#pick-panel h3 { font-size:12px; color:#ffd93d; margin-bottom:6px; }
#pick-coords { font-size:13px; font-weight:bold; color:#fff; margin-bottom:6px; }
#pick-actions { display:flex; flex-wrap:wrap; gap:4px; }
#pick-actions button { padding:4px 8px; font-size:11px; background:#2d6a4f; border:1px solid #40916c; border-radius:3px; color:#fff; cursor:pointer; }
#pick-actions button:hover { background:#40916c; }
#pick-dist { font-size:11px; color:#888; margin-top:4px; }

#event-list { flex:1; overflow-y:auto; padding:4px; }
.ev-item { padding:4px 8px; margin:1px 0; border-radius:3px; font-size:11px; cursor:pointer; border-left:3px solid transparent; }
.ev-item:hover { background:#1a1a2e; }
.ev-item.active { background:#0f3460; border-left-color:#1a73e8; }
.ev-item.movement { border-left-color:#ff6b6b; font-weight:bold; }
.ev-item .ev-idx { color:#666; margin-right:4px; }
.ev-item .ev-type { color:#7ec8e3; }
.ev-item .ev-detail { color:#aaa; margin-left:4px; }

#detail-panel { padding:8px; background:#0d1b2a; border-top:1px solid #333; max-height:180px; overflow-y:auto; }
#detail-panel h3 { font-size:12px; margin-bottom:4px; color:#7ec8e3; }
.detail-row { display:flex; align-items:center; gap:4px; margin:2px 0; font-size:11px; }
.detail-row label { width:65px; color:#888; text-align:right; flex-shrink:0; }
.detail-row input { width:70px; padding:2px 5px; background:#1a1a2e; border:1px solid #444; border-radius:3px; color:#e0e0e0; font-size:11px; }
.detail-row .apply-btn { padding:1px 6px; background:#2d6a4f; border:1px solid #40916c; border-radius:3px; color:#fff; cursor:pointer; font-size:10px; }

#canvas-area { flex:1; position:relative; overflow:hidden; }
canvas { display:block; cursor:crosshair; }
#coords { position:absolute; bottom:8px; left:8px; font-size:11px; color:#888; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:3px; }
#legend { position:absolute; top:8px; right:8px; font-size:10px; background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:5px; line-height:1.7; }
.legend-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:3px; vertical-align:middle; }

#save-status { position:absolute; top:8px; left:8px; font-size:12px; padding:4px 10px; border-radius:4px; display:none; }
#save-status.ok { display:block; background:#2d6a4f; color:#fff; }
#save-status.err { display:block; background:#c0392b; color:#fff; }

/* クロスヘア */
#crosshair-info { position:absolute; bottom:8px; right:8px; font-size:11px; background:rgba(0,0,0,0.7); padding:4px 8px; border-radius:3px; color:#ffd93d; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>イベントパスビューア</h1>
  <div id="controls">
    <label>マップ</label>
    <select id="map-select">
      <option value="stage_iriguchi">CP1: 廃村入口</option>
      <option value="stage_naibu">CP2/CP4: 廃村内部</option>
      <option value="stage_souko">CP3: 廃倉庫</option>
      <option value="stage_escape">CP5: 脱出路</option>
      <option value="stage_yashiki">テスト: 廃屋敷</option>
      <option value="public_toilet">テスト: 公衆トイレ</option>
      <option value="empty">空のグリッド</option>
    </select>
    <label>対話JSON</label>
    <input type="file" id="json-file" accept=".json">
    <div class="btn-row">
      <button id="btn-save">JSON保存</button>
      <button id="btn-play">再生</button>
      <button id="btn-reset">表示リセット</button>
    </div>
    <label style="font-size:10px;color:#555;">クリック=地点選択 / ドラッグ=パン / ホイール=ズーム / 赤丸ドラッグ=位置変更</label>
  </div>

  <div id="pick-panel" class="hidden">
    <h3>選択した地点</h3>
    <div id="pick-coords">X: 0.00, Z: 0.00</div>
    <div id="pick-actions">
      <button onclick="actionWalkHere()">ここに歩かせる</button>
      <button onclick="actionFaceHere()">ここを向かせる</button>
      <button onclick="actionSetSpawn()">スタート地点にする</button>
      <button onclick="actionCopyCoords()">座標コピー</button>
    </div>
    <div id="pick-dist"></div>
  </div>

  <div id="event-list"></div>
  <div id="detail-panel"></div>
</div>

<div id="canvas-area">
  <canvas id="cv"></canvas>
  <div id="coords">X: 0.00, Z: 0.00</div>
  <div id="legend">

    <span class="legend-dot" style="background:#ffd93d;"></span>回転<br>

    <span class="legend-dot" style="background:#fff;"></span>初期位置<br>

const ctx = cv.getContext("2d");
let camX = 0, camZ = 0, zoom = 40, dragWP = -1, panStart = null;

// ═══════════════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════════════
function init() {
  resize();
  window.addEventListener("resize", resize);
  cv.addEventListener("wheel", onWheel);
  cv.addEventListener("mousedown", onMouseDown);
  cv.addEventListener("mousemove", onMouseMove);
  cv.addEventListener("mouseup", onMouseUp);
  cv.addEventListener("mouseleave", onMouseUp);
  document.getElementById("map-select").addEventListener("change", onMapChange);
  document.getElementById("json-file").addEventListener("change", onFileLoad);
  document.getElementById("btn-save").addEventListener("click", onSave);
  document.getElementById("btn-play").addEventListener("click", onPlay);
  document.getElementById("btn-reset").addEventListener("click", resetView);
  resetView(); draw();
}
function resize() {
  const a = document.getElementById("canvas-area");
  cv.width = a.clientWidth; cv.height = a.clientHeight; draw();
}
function resetView() {
  const b = currentMap.bounds;
  camX = (b.xMin + b.xMax) / 2; camZ = (b.zMin + b.zMax) / 2;
  zoom = Math.min(cv.width / (b.xMax - b.xMin + 2), cv.height / (b.zMax - b.zMin + 2)) * 0.85;
  draw();
}

// 座標変換
// Z軸反転: Godotの-Z（前方）を画面上に表示。ゲーム内の左右と一致する
function w2s(wx, wz) { return [cv.width/2 + (wx-camX)*zoom, cv.height/2 + (wz-camZ)*zoom]; }
function s2w(sx, sy) { return [(sx - cv.width/2)/zoom + camX, (sy - cv.height/2)/zoom + camZ]; }

// ═══════════════════════════════════════════════════
// パス抽出
// ═══════════════════════════════════════════════════
function extractPath() {
  playerPath = [];
  let px = currentMap.spawn.x, pz = currentMap.spawn.z, rot = 0;
  playerPath.push({ x: px, z: pz, rot, eventIdx: -1, type: "spawn" });
  for (let i = 0; i < events.length; i++) {
    const ev = events[i], t = ev.type;
    if (t === "rot_y") { rot = parseFloat(ev.target)||0; playerPath.push({x:px,z:pz,rot,eventIdx:i,type:"rot_y"}); }
    else if (t === "pos_z") { pz = parseFloat(ev.target)||0; playerPath.push({x:px,z:pz,rot,eventIdx:i,type:"pos_z"}); }
    else if (t === "pos_x") { px = parseFloat(ev.target)||0; playerPath.push({x:px,z:pz,rot,eventIdx:i,type:"pos_x"}); }
    else if (t === "walk_set") { playerPath.push({x:px,z:pz,rot,eventIdx:i,type:"walk_set"}); }
    else if (t === "stage_swap") { playerPath.push({x:px,z:pz,rot,eventIdx:i,type:"stage_swap"}); }
  }
}

// ═══════════════════════════════════════════════════
// 描画
// ═══════════════════════════════════════════════════
function draw() {
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle = "#111122"; ctx.fillRect(0,0,cv.width,cv.height);
  drawGrid(); drawMap(); drawPath(); drawFOV(); drawWaypoints(); drawPickedPoint();
}

function drawGrid() {
  let gs = 1; if (zoom < 15) gs = 5; if (zoom < 5) gs = 10;
  const [x0,z0] = s2w(0,cv.height), [x1,z1] = s2w(cv.width,0);
  ctx.strokeStyle = "#1a1a2e"; ctx.lineWidth = 1;
  for (let x = Math.floor(x0/gs)*gs; x <= x1; x += gs) { const [sx]=w2s(x,0); ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,cv.height); ctx.stroke(); }
  for (let z = Math.floor(z0/gs)*gs; z <= z1; z += gs) { const [,sy]=w2s(0,z); ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(cv.width,sy); ctx.stroke(); }
  ctx.strokeStyle = "#333"; const [ax]=w2s(0,0), [,ay]=w2s(0,0);
  ctx.beginPath(); ctx.moveTo(ax,0); ctx.lineTo(ax,cv.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,ay); ctx.lineTo(cv.width,ay); ctx.stroke();
  ctx.fillStyle = "#555"; ctx.font = "10px sans-serif";
  ctx.fillText("+X (右)", ax+4, 14); ctx.fillText("-Z (前方)", 4, w2s(0,z0)[1]+14);
}

function drawMap() {
  for (const r of currentMap.rects) {
    const [sx,sy] = w2s(r.x, r.z);
    ctx.fillStyle = r.color; ctx.fillRect(sx,sy, r.w*zoom, r.h*zoom);
    if (r.label) { ctx.fillStyle = "#888"; ctx.font = "10px sans-serif"; ctx.fillText(r.label, sx+3, sy+12); }
  }
  for (const lb of (currentMap.labels||[])) {
    const [sx,sy] = w2s(lb.x, lb.z);
    ctx.fillStyle = "#666"; ctx.font = `${lb.size||10}px sans-serif`; ctx.fillText(lb.text, sx, sy);
  }
}

function drawPath() {
  if (playerPath.length < 2) return;
  ctx.strokeStyle = "rgba(255,107,107,0.4)"; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.beginPath(); const [sx0,sy0] = w2s(playerPath[0].x, playerPath[0].z); ctx.moveTo(sx0,sy0);
  for (let i=1;i<playerPath.length;i++){const [sx,sy]=w2s(playerPath[i].x,playerPath[i].z);ctx.lineTo(sx,sy);}
  ctx.stroke(); ctx.setLineDash([]);
  // 矢印
  for (let i=1;i<playerPath.length;i++){
    const p0=playerPath[i-1],p1=playerPath[i],dx=p1.x-p0.x,dz=p1.z-p0.z;
    if(Math.sqrt(dx*dx+dz*dz)<0.01)continue;
    const [a,b]=w2s(p0.x,p0.z),[c,d]=w2s(p1.x,p1.z),mx=(a+c)/2,my=(b+d)/2,ang=Math.atan2(d-b,c-a);
    ctx.fillStyle="rgba(255,107,107,0.6)";ctx.beginPath();
    ctx.moveTo(mx+Math.cos(ang)*8,my+Math.sin(ang)*8);
    ctx.lineTo(mx+Math.cos(ang+2.5)*6,my+Math.sin(ang+2.5)*6);
    ctx.lineTo(mx+Math.cos(ang-2.5)*6,my+Math.sin(ang-2.5)*6);ctx.closePath();ctx.fill();
  }
}

// 視野コーン描画
function drawFOV() {
  for (let i=0;i<playerPath.length;i++){
    const wp = playerPath[i];
    if (wp.rot === undefined) continue;
    const [sx,sy] = w2s(wp.x, wp.z);
    const isSelected = (wp.eventIdx === selectedIdx);
    const fovAngle = Math.PI / 3; // 60度 FOV
    const fovLen = isSelected ? 50 : 25;
    const dir = -(wp.rot) - Math.PI/2;
    ctx.fillStyle = isSelected ? "rgba(100,180,255,0.12)" : "rgba(100,180,255,0.05)";
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.arc(sx, sy, fovLen, dir - fovAngle/2, dir + fovAngle/2);
    ctx.closePath(); ctx.fill();
  }
}

const WP_COLORS = { spawn:"#ffffff", pos_z:"#ff6b6b", pos_x:"#ff6b6b", rot_y:"#ffd93d", walk_set:"#6bcb77", stage_swap:"#4d96ff" };

function drawWaypoints() {
  for (let i=0;i<playerPath.length;i++){
    const wp=playerPath[i],[sx,sy]=w2s(wp.x,wp.z);
    const color=WP_COLORS[wp.type]||"#aaa", isSel=(wp.eventIdx===selectedIdx), r=isSel?8:6;
    if(isSel){ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,r+3,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#000";ctx.font="bold 9px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(i,sx,sy);
    // 向き矢印
    if(wp.rot!==undefined){
      const ang=-(wp.rot)-Math.PI/2,al=16,ax=sx+Math.cos(ang)*al,ay=sy+Math.sin(ang)*al;
      ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ax,ay);ctx.stroke();
      ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(ax,ay);
      ctx.lineTo(ax+Math.cos(ang+2.6)*5,ay+Math.sin(ang+2.6)*5);
      ctx.lineTo(ax+Math.cos(ang-2.6)*5,ay+Math.sin(ang-2.6)*5);ctx.closePath();ctx.fill();
    }
    // 座標
    ctx.fillStyle="#888";ctx.font="9px sans-serif";ctx.textAlign="left";ctx.textBaseline="top";
    if(wp.type==="pos_z"||wp.type==="pos_x"||wp.type==="spawn") ctx.fillText(`(${wp.x.toFixed(1)}, ${wp.z.toFixed(1)})`,sx+10,sy-4);
    if(wp.type==="rot_y") ctx.fillText(`${(wp.rot*180/Math.PI).toFixed(0)}°`,sx+10,sy-4);
  }
  ctx.textAlign="start";ctx.textBaseline="alphabetic";
}

// 選択地点のクロスヘア
function drawPickedPoint() {
  if (!pickedPoint) return;
  const [sx,sy] = w2s(pickedPoint.x, pickedPoint.z);
  ctx.strokeStyle = "#ffd93d"; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(sx-15,sy); ctx.lineTo(sx+15,sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy-15); ctx.lineTo(sx,sy+15); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = "#ffd93d"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.stroke();

  // 現在プレイヤー位置からの距離線
  const lastWP = getPlayerPosAtSelected();
  if (lastWP) {
    const [lx,ly] = w2s(lastWP.x, lastWP.z);
    ctx.strokeStyle = "rgba(255,217,61,0.3)"; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(sx,sy); ctx.stroke(); ctx.setLineDash([]);
  }
}

// ═══════════════════════════════════════════════════
// イベント一覧
// ═══════════════════════════════════════════════════
const MOVEMENT_TYPES = new Set(["pos_z","pos_x","pos_z_await","pos_x_await","rot_y","walk_set","stage_swap","head_x"]);
const TYPE_JA = {
  say:"セリフ",say_clear:"セリフ消去",chat:"チャット",wait:"待機",sleep:"固定待機",
  rot_y:"回転",head_x:"頭上下",pos_z:"Z移動",pos_x:"X移動",
  pos_z_await:"Z移動待ち",pos_x_await:"X移動待ち",
  walk_set:"歩行",stage_swap:"マップ切替",flashlight_on:"ライトON",
  flashlight_flicker:"ライト明滅",sfx:"効果音",set_viewers:"視聴者数",
  horror_glitch:"グリッチ",horror_tint:"赤染め",horror_tint_clear:"赤染め解除",
  horror_flash:"フラッシュ",scare_flash:"恐怖フラッシュ",
  use_ofuda:"お札使用",fade_black:"暗転",polaroid_video:"動画",superchat:"スパチャ",
};

function buildEventList() {
  const el = document.getElementById("event-list"); el.innerHTML = "";
  for (let i=0;i<events.length;i++){
    const ev=events[i],t=ev.type||""; if(t==="_comment")continue;
    const div=document.createElement("div");
    div.className="ev-item"+(MOVEMENT_TYPES.has(t)?" movement":""); if(i===selectedIdx)div.className+=" active";
    const ja=TYPE_JA[t]||t; let det="";
    if(t==="say")det=ev.text?ev.text.substring(0,25):"";
    else if(t==="pos_z")det=`z=${ev.target}`; else if(t==="pos_x")det=`x=${ev.target}`;
    else if(t==="rot_y")det=`${(ev.target*180/Math.PI).toFixed(0)}°`;
    else if(t==="wait"||t==="sleep")det=`${ev.sec}秒`;
    else if(t==="walk_set")det=ev.on?"開始":"停止";
    else if(t==="chat")det=ev.msg?ev.msg.substring(0,20):"";
    else if(t==="set_viewers")det=`${ev.count}人`; else if(t==="sfx")det=ev.sound||"";
    div.innerHTML=`<span class="ev-idx">${i}</span><span class="ev-type">${ja}</span><span class="ev-detail">${det}</span>`;
    div.addEventListener("click",()=>selectEvent(i)); el.appendChild(div);
  }
}

function selectEvent(idx) {
  selectedIdx = idx; buildEventList(); showDetail(idx);
  const a=document.querySelector(".ev-item.active"); if(a)a.scrollIntoView({block:"nearest"});
  const wp=playerPath.find(w=>w.eventIdx===idx);
  if(wp){camX=wp.x;camZ=wp.z;}
  updatePickPanel(); draw();
}

function showDetail(idx) {
  const panel=document.getElementById("detail-panel");
  if(idx<0||idx>=events.length){panel.innerHTML="";return;}
  const ev=events[idx],t=ev.type,ja=TYPE_JA[t]||t;
  let h=`<h3>#${idx} ${ja}</h3>`;
  if(t==="pos_z"||t==="pos_x"){
    const ax=t==="pos_z"?"Z":"X";
    h+=`<div class="detail-row"><label>${ax}目標:</label><input type="number" step="0.1" id="edit-target" value="${ev.target||0}"><button class="apply-btn" onclick="applyEdit(${idx},'target')">適用</button></div>`;
    h+=`<div class="detail-row"><label>秒数:</label><input type="number" step="0.1" id="edit-dur" value="${ev.dur||5}"><button class="apply-btn" onclick="applyEdit(${idx},'dur')">適用</button></div>`;
  } else if(t==="rot_y"){
    h+=`<div class="detail-row"><label>回転値:</label><input type="number" step="0.01" id="edit-target" value="${ev.target||0}"><button class="apply-btn" onclick="applyEdit(${idx},'target')">適用</button></div>`;
    h+=`<div class="detail-row"><label>角度:</label><span>${((ev.target||0)*180/Math.PI).toFixed(1)}°</span></div>`;
    h+=`<div class="detail-row"><label>秒数:</label><input type="number" step="0.1" id="edit-dur" value="${ev.dur||1}"><button class="apply-btn" onclick="applyEdit(${idx},'dur')">適用</button></div>`;
  } else if(t==="head_x"){
    h+=`<div class="detail-row"><label>上下角:</label><input type="number" step="0.01" id="edit-target" value="${ev.target||0}"><button class="apply-btn" onclick="applyEdit(${idx},'target')">適用</button></div>`;
  } else if(t==="say"){
    h+=`<div class="detail-row"><label>テキスト:</label><span style="font-size:11px;">${(ev.text||"").substring(0,60)}</span></div>`;
    if(ev.voice) h+=`<div class="detail-row"><label>ボイス:</label><span>${ev.voice}</span></div>`;
  } else {
    for(const[k,v]of Object.entries(ev)){if(k==="type")continue; h+=`<div class="detail-row"><label>${k}:</label><span>${JSON.stringify(v)}</span></div>`;}
  }
  panel.innerHTML=h;
}

window.applyEdit = function(idx, field) {
  const inp=document.getElementById("edit-"+field); if(!inp)return;
  const val=parseFloat(inp.value); if(isNaN(val))return;
  events[idx][field]=val; extractPath(); buildEventList(); showDetail(idx); draw();
};

// ═══════════════════════════════════════════════════
// 選択地点パネル + アクション
// ═══════════════════════════════════════════════════
function getPlayerPosAtSelected() {
  // 選択中イベントの時点でのプレイヤー位置を返す
  if (playerPath.length === 0) return null;
  if (selectedIdx < 0) return playerPath[playerPath.length - 1];
  // selectedIdx 以下で最後のwaypoint
  let last = playerPath[0];
  for (const wp of playerPath) {
    if (wp.eventIdx <= selectedIdx) last = wp;
  }
  return last;
}

function updatePickPanel() {
  const panel = document.getElementById("pick-panel");
  const distEl = document.getElementById("pick-dist");
  if (!pickedPoint) { panel.className = "hidden"; return; }
  panel.className = "";
  document.getElementById("pick-coords").textContent = `X: ${pickedPoint.x.toFixed(2)},  Z: ${pickedPoint.z.toFixed(2)}`;

  const pp = getPlayerPosAtSelected();
  if (pp) {
    const dx = pickedPoint.x - pp.x, dz = pickedPoint.z - pp.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    distEl.textContent = `現在位置(${pp.x.toFixed(1)}, ${pp.z.toFixed(1)})からの距離: ${dist.toFixed(2)}m`;
  } else { distEl.textContent = ""; }
}

// ここに歩かせる
window.actionWalkHere = function() {
  if (!pickedPoint || !jsonData) return;
  const pp = getPlayerPosAtSelected();
  if (!pp) return;
  const dx = Math.abs(pickedPoint.x - pp.x), dz = Math.abs(pickedPoint.z - pp.z);
  const insertAt = selectedIdx >= 0 ? selectedIdx + 1 : events.length;
  const newEvents = [];
  // walk_set ON
  newEvents.push({ type: "walk_set", on: true });
  // 必要に応じてpos_x, pos_z
  if (dx > 0.01) {
    const dist = dx; const dur = Math.round(dist / 1.5 * 10) / 10; // 1.5m/s 歩行
    newEvents.push({ type: "pos_x", target: Math.round(pickedPoint.x*4)/4, dur, id: "" });
  }
  if (dz > 0.01) {
    const dist = dz; const dur = Math.round(dist / 1.5 * 10) / 10;
    newEvents.push({ type: "pos_z", target: Math.round(pickedPoint.z*4)/4, dur, id: "" });
  }
  // walk_set OFF
  newEvents.push({ type: "walk_set", on: false });
  events.splice(insertAt, 0, ...newEvents);
  extractPath(); buildEventList(); selectEvent(insertAt);
  showStatus("歩行イベントを追加しました");
};

// ここを向かせる
window.actionFaceHere = function() {
  if (!pickedPoint || !jsonData) return;
  const pp = getPlayerPosAtSelected();
  if (!pp) return;
  const dx = pickedPoint.x - pp.x, dz = pickedPoint.z - pp.z;
  // Godot: rot_y=0 は -Z方向。atan2(dx, -dz) で正しい角度
  const rot = Math.atan2(dx, -dz);
  const rounded = Math.round(rot * 100) / 100;
  const insertAt = selectedIdx >= 0 ? selectedIdx + 1 : events.length;
  events.splice(insertAt, 0, { type: "rot_y", target: rounded, dur: 0.8 });
  extractPath(); buildEventList(); selectEvent(insertAt);
  showStatus(`回転イベントを追加 (${(rounded*180/Math.PI).toFixed(0)}°)`);
};

// スタート地点にする
window.actionSetSpawn = function() {
  if (!pickedPoint) return;
  currentMap.spawn.x = Math.round(pickedPoint.x * 4) / 4;
  currentMap.spawn.z = Math.round(pickedPoint.z * 4) / 4;
  extractPath(); draw();
  showStatus(`スタート地点: (${currentMap.spawn.x}, ${currentMap.spawn.z})`);
};

// 座標コピー
window.actionCopyCoords = function() {
  if (!pickedPoint) return;
  const text = `${pickedPoint.x.toFixed(2)}, ${pickedPoint.z.toFixed(2)}`;
  navigator.clipboard.writeText(text).then(() => showStatus("座標をコピーしました"));
};

function showStatus(msg) {
  const s = document.getElementById("save-status");
  s.className = "ok"; s.textContent = msg; s.style.display = "block";
  setTimeout(() => { s.style.display = "none"; }, 2000);
}

// ═══════════════════════════════════════════════════
// マウス操作
// ═══════════════════════════════════════════════════
let mouseDownPos = null;
function onWheel(e) { e.preventDefault(); zoom *= e.deltaY>0?0.9:1.1; zoom=Math.max(3,Math.min(200,zoom)); draw(); }

function findNearestWP(sx,sy,maxDist) {
  let best=-1,bestD=maxDist*maxDist;
  for(let i=0;i<playerPath.length;i++){
    const wp=playerPath[i]; if(wp.type!=="pos_z"&&wp.type!=="pos_x"&&wp.type!=="spawn")continue;
    const [wx,wy]=w2s(wp.x,wp.z),d=(sx-wx)**2+(sy-wy)**2; if(d<bestD){bestD=d;best=i;}
  } return best;
}

function onMouseDown(e) {
  const rect=cv.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
  mouseDownPos = { x: mx, y: my };
  const wpIdx=findNearestWP(mx,my,12);
  if(wpIdx>=0&&e.button===0){dragWP=wpIdx;const wp=playerPath[wpIdx];if(wp.eventIdx>=0)selectEvent(wp.eventIdx);return;}
  if(e.button===0||e.button===1){panStart={x:mx,y:my,cx:camX,cz:camZ};}
}

function onMouseMove(e) {
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const [wx,wz]=s2w(mx,my);
  document.getElementById("coords").textContent=`X: ${wx.toFixed(2)}, Z: ${wz.toFixed(2)}`;
  // クロスヘア情報
  const chi = document.getElementById("crosshair-info");
  const pp = getPlayerPosAtSelected();
  if (pp) {
    const d = Math.sqrt((wx-pp.x)**2 + (wz-pp.z)**2);
    chi.textContent = `距離: ${d.toFixed(2)}m`;
  } else { chi.textContent = ""; }

  if(dragWP>=0){
    const wp=playerPath[dragWP]; wp.x=Math.round(wx*4)/4; wp.z=Math.round(wz*4)/4;
    if(wp.eventIdx>=0){const ev=events[wp.eventIdx];if(ev.type==="pos_z")ev.target=wp.z;if(ev.type==="pos_x")ev.target=wp.x;}
    extractPath(); showDetail(wp.eventIdx); draw(); return;
  }
  if(panStart){camX=panStart.cx-(mx-panStart.x)/zoom;camZ=panStart.cz+(my-panStart.y)/zoom;draw();}
}

function onMouseUp(e) {
  // クリック判定（ドラッグしなかった場合のみ地点選択）
  if (mouseDownPos && dragWP < 0 && !panStart?.moved) {
    const rect=cv.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const dx = mx - mouseDownPos.x, dy = my - mouseDownPos.y;
    if (Math.sqrt(dx*dx+dy*dy) < 5) {
      // クリック → 地点選択
      const [wx,wz] = s2w(mx, my);
      pickedPoint = { x: Math.round(wx*4)/4, z: Math.round(wz*4)/4 };
      updatePickPanel(); draw();
    }
  }
  dragWP=-1; panStart=null; mouseDownPos=null;
}

// panStart.moved を追跡
const origOnMouseMove = onMouseMove;
onMouseMove = function(e) {
  if (panStart && mouseDownPos) {
    const rect=cv.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
    if (Math.sqrt((mx-mouseDownPos.x)**2+(my-mouseDownPos.y)**2) > 5) panStart.moved = true;
  }
  origOnMouseMove(e);
};

// ═══════════════════════════════════════════════════
// ファイル入出力
// ═══════════════════════════════════════════════════
function onMapChange() {
  currentMap = MAPS[document.getElementById("map-select").value] || MAPS.empty;
  extractPath(); resetView(); draw();
}

function onFileLoad(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{jsonData=JSON.parse(ev.target.result);events=jsonData.events||[];extractPath();buildEventList();resetView();draw();}
    catch(err){alert("JSON解析エラー: "+err.message);}
  }; reader.readAsText(file);
}

async function onSave() {
  if(!jsonData){alert("JSONが読み込まれていません");return;}
  jsonData.events=events;
  const text=JSON.stringify(jsonData,null,"\t")+"\n";
  try{
    if(window.showSaveFilePicker){
      const h=await window.showSaveFilePicker({suggestedName:(jsonData.chapter||"events")+".json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
      const w=await h.createWritable();await w.write(text);await w.close();showStatus("保存しました");
    }else{
      const b=new Blob([text],{type:"application/json"}),a=document.createElement("a");
      a.href=URL.createObjectURL(b);a.download=(jsonData.chapter||"events")+".json";a.click();showStatus("ダウンロードしました");
    }
  }catch(err){if(err.name!=="AbortError")showStatus("エラー: "+err.message);}
}

// ═══════════════════════════════════════════════════
// 実速度アニメーション再生
// ═══════════════════════════════════════════════════
let playAnim = null;
function onPlay() {
  if (playAnim) { cancelAnimationFrame(playAnim.raf); playAnim = null; document.getElementById("btn-play").textContent = "再生"; return; }
  if (playerPath.length < 2) return;
  document.getElementById("btn-play").textContent = "停止";

  const segments = [];
  for (let i = 1; i < playerPath.length; i++) {
    const p0 = playerPath[i-1], p1 = playerPath[i];
    const dx = p1.x - p0.x, dz = p1.z - p0.z, dist = Math.sqrt(dx*dx+dz*dz);
    // durをイベントから取得、なければ距離/1.5で推定
    let dur = 0.5;
    if (p1.eventIdx >= 0) {
      const ev = events[p1.eventIdx];
      if (ev.dur) dur = ev.dur;
      else if (dist > 0.01) dur = dist / 1.5;
    }
    segments.push({ from: p0, to: p1, dur: Math.max(dur, 0.1) });
  }

  let segIdx = 0, segT = 0, lastTime = performance.now();
  function tick(now) {
    if (segIdx >= segments.length) { playAnim = null; document.getElementById("btn-play").textContent = "再生"; return; }
    const dt = (now - lastTime) / 1000; lastTime = now;
    segT += dt;
    const seg = segments[segIdx];
    const t = Math.min(segT / seg.dur, 1);
    const cx = seg.from.x + (seg.to.x - seg.from.x) * t;
    const cz = seg.from.z + (seg.to.z - seg.from.z) * t;
    camX = cx; camZ = cz;
    if (seg.to.eventIdx >= 0) selectedIdx = seg.to.eventIdx;
    draw();
    // プレイヤーハイライト
    const [sx,sy] = w2s(cx, cz);
    ctx.fillStyle = "rgba(255,255,0,0.5)"; ctx.beginPath(); ctx.arc(sx,sy,12,0,Math.PI*2); ctx.fill();
    // 視野コーン（アニメ中）
    const rot = seg.from.rot + (seg.to.rot - seg.from.rot) * t;
    const dir = -rot - Math.PI/2;
    ctx.fillStyle = "rgba(255,255,100,0.15)"; ctx.beginPath(); ctx.moveTo(sx,sy);
    ctx.arc(sx,sy,60,dir-Math.PI/6,dir+Math.PI/6); ctx.closePath(); ctx.fill();

    if (t >= 1) { segIdx++; segT = 0; }
    playAnim.raf = requestAnimationFrame(tick);
  }
  playAnim = { raf: requestAnimationFrame(tick) };
}

// ═══════════════════════════════════════════════════
init();
</script>
