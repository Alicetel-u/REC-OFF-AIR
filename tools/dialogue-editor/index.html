<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC:OFF:AIR セリフエディタ</title>
<style>
:root {
  --bg0: #0a0e17; --bg1: #111827; --bg2: #1e293b; --bg3: #334155;
  --tx0: #f1f5f9; --tx1: #94a3b8; --tx2: #64748b;
  --accent: #ef4444; --accent-g: linear-gradient(135deg, #ef4444, #f97316);
  --org: #f97316; --pur: #a855f7; --grn: #22c55e;
  --radius: 12px;
  --font: 'Segoe UI', 'Meiryo', 'Noto Sans JP', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { font-size: 14px }
body { font-family: var(--font); background: var(--bg0); color: var(--tx0); height: 100vh; display: flex; flex-direction: column; overflow: hidden }
button { cursor: pointer; font-family: var(--font) }
input, select, textarea { font-family: var(--font); font-size: inherit }
::-webkit-scrollbar { width: 8px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px }
::selection { background: var(--accent); color: #fff }

/* ── ヘッダー ── */
.header {
  background: var(--bg1); padding: 0 20px; display: flex; align-items: center;
  height: 52px; border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0; gap: 12px;
}
.logo {
  font-size: 1.2rem; font-weight: 800;
  background: var(--accent-g); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -.5px; white-space: nowrap;
}
.header select {
  background: var(--bg2); color: var(--tx0); border: 1px solid var(--bg3);
  border-radius: 8px; padding: 6px 12px; font-size: .9rem;
}
.header select:focus { outline: none; border-color: var(--accent) }
.chapter-name { color: var(--tx2); font-size: .85rem }
.spacer { flex: 1 }
.badge {
  background: rgba(249,115,22,.15); color: var(--org); padding: 4px 14px;
  border-radius: 20px; font-size: .85rem; font-weight: 700; white-space: nowrap;
}
.btn {
  padding: 8px 18px; border: 1px solid var(--bg3); border-radius: 8px;
  background: var(--bg2); color: var(--tx1); font-size: .9rem; transition: all .12s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg3); color: var(--tx0) }
.btn-save { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700 }
.btn-save:hover { filter: brightness(1.15) }

/* ── カードリスト ── */
.card-list {
  flex: 1; overflow-y: auto; padding: 16px 16px 120px;
  display: flex; flex-direction: column; align-items: center;
}
.card-list-inner { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 8px }

/* ── カード ── */
.card {
  background: var(--bg1); border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius); padding: 16px; transition: border-color .15s, box-shadow .15s;
  animation: fadeIn .2s ease;
}
.card:hover { border-color: rgba(255,255,255,.1); box-shadow: 0 2px 16px rgba(0,0,0,.3) }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px) } to { opacity: 1; transform: translateY(0) } }

.card-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.grip {
  cursor: grab; color: var(--bg3); user-select: none; font-size: 1.2rem;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; transition: all .12s; flex-shrink: 0;
}
.grip:hover { color: var(--tx1); background: var(--bg2) }
.card-num { color: var(--tx2); font-size: .8rem; font-weight: 500 }
.voice-badge {
  background: rgba(249,115,22,.12); color: var(--org); padding: 3px 10px;
  border-radius: 16px; font-size: .75rem; font-weight: 700; font-family: monospace;
}
.voice-badge.empty { background: rgba(255,255,255,.05); color: var(--tx2) }
.btn-del {
  width: 32px; height: 32px; border: none; border-radius: 8px;
  background: transparent; color: var(--tx2); font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center; transition: all .12s;
  flex-shrink: 0; opacity: 0;
}
.card:hover .btn-del { opacity: 1 }
.btn-del:hover { background: rgba(239,68,68,.15); color: var(--accent) }

/* ── テキストエリア ── */
.field-text {
  width: 100%; background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.08);
  color: var(--tx0); border-radius: 8px; padding: 12px 14px;
  font-size: 1rem; line-height: 1.7; resize: none; overflow: hidden;
  min-height: 48px; transition: border-color .15s;
}
.field-text:focus { outline: none; border-color: var(--accent) }
.field-text::placeholder { color: var(--tx2) }

/* ── 読みセクション ── */
.reading-section { margin-top: 8px }
.reading-toggle {
  background: none; border: none; color: var(--pur); font-size: .82rem;
  padding: 4px 0; cursor: pointer; display: flex; align-items: center; gap: 4px;
}
.reading-toggle:hover { text-decoration: underline }
.reading-body { margin-top: 6px }
.field-reading {
  width: 100%; background: rgba(168,85,247,.05); border: 1px solid rgba(168,85,247,.15);
  color: var(--tx0); border-radius: 8px; padding: 10px 14px;
  font-size: .95rem; line-height: 1.6; resize: none; overflow: hidden; min-height: 40px;
}
.field-reading:focus { outline: none; border-color: var(--pur) }
.field-reading::placeholder { color: rgba(168,85,247,.4) }

/* ── Voice ID 編集 ── */
.voice-edit {
  margin-top: 8px; display: flex; align-items: center; gap: 8px;
}
.voice-label { color: var(--tx2); font-size: .8rem; flex-shrink: 0 }
.field-voice {
  background: rgba(0,0,0,.2); border: 1px solid rgba(255,255,255,.06);
  color: var(--org); border-radius: 6px; padding: 4px 10px;
  font-size: .85rem; font-family: monospace; width: 80px;
}
.field-voice:focus { outline: none; border-color: var(--org) }

/* ── カード間の追加ボタン ── */
.insert-gap {
  display: flex; justify-content: center; padding: 2px 0; min-height: 8px;
}
.insert-btn {
  width: 32px; height: 32px; border: 2px dashed var(--bg3); border-radius: 50%;
  background: transparent; color: var(--tx2); font-size: 1.2rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all .15s; cursor: pointer;
}
.insert-gap:hover .insert-btn { opacity: 1 }
.insert-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(239,68,68,.08) }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 56px; right: 28px;
  background: var(--accent-g); color: #fff; border: none;
  border-radius: 28px; padding: 14px 28px; font-size: 1rem; font-weight: 700;
  box-shadow: 0 4px 24px rgba(239,68,68,.35); cursor: pointer; z-index: 50;
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: translateY(-2px); box-shadow: 0 6px 32px rgba(239,68,68,.45) }

/* ── 空状態 ── */
.empty-state {
  text-align: center; color: var(--tx2); padding: 80px 20px; font-size: 1.05rem; line-height: 1.8;
}
.empty-state .hint { font-size: .9rem; margin-top: 16px; color: var(--tx2); opacity: .7 }

/* ── トースト ── */
.toast {
  position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg2); color: var(--tx0); padding: 10px 24px; border-radius: var(--radius);
  font-size: .9rem; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
  border: 1px solid rgba(255,255,255,.1); box-shadow: 0 4px 24px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }

/* ── フッター ── */
.footer {
  background: var(--bg1); border-top: 1px solid rgba(255,255,255,.06);
  padding: 4px 20px; display: flex; align-items: center; gap: 12px;
  font-size: .78rem; color: var(--tx2); flex-shrink: 0; height: 32px;
}
.footer .dirty { color: #eab308; font-weight: 600 }

/* ── ドラッグ中 ── */
.card.dragging { opacity: .3 }
.card.drop-above { border-top: 3px solid var(--accent) }
.card.drop-below { border-bottom: 3px solid var(--accent) }

/* ── ローディング ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--tx2); padding: 80px }
.spinner { width: 36px; height: 36px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite }
@keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>
<body>

<header class="header">
  <span class="logo">REC:OFF:AIR</span>
  <select id="fileSel"></select>
  <span class="chapter-name" id="chapterName"></span>
  <div class="spacer"></div>
  <span class="badge" id="countBadge">0 セリフ</span>
  <button class="btn btn-save" id="btnSave">保存</button>
  <button class="btn" id="btnOpen">開く</button>
  <input type="file" id="fileInput" accept=".json" hidden>
</header>

<main class="card-list" id="cardList">
  <div class="card-list-inner" id="listInner">
    <div class="loading" id="loadingView"><div class="spinner"></div><div>読み込み中...</div></div>
  </div>
</main>

<button class="fab" id="btnAdd">+ セリフ追加</button>
<div class="toast" id="toast"></div>
<footer class="footer"><span id="statusMsg">起動中...</span><div class="spacer"></div><span>Ctrl+S 保存 / Ctrl+Z 戻す / Ctrl+Y やり直す</span></footer>

<script>
const OWNER = 'Alicetel-u', REPO = 'REC-OFF-AIR', BR = 'master', DIR = 'dialogue';
const $ = s => document.querySelector(s);

let data = null, dirty = false, fname = '';
let undoStack = [], redoStack = [];
let _undoTimer = null, _undoPending = false;

// ── 起動 ──
(async () => { await loadFileList(); bindAll(); })();

// ══════════ データ読み込み ══════════

async function loadFileList() {
  const sel = $('#fileSel');
  try {
    const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}?ref=${BR}`);
    if (!r.ok) throw new Error(r.status);
    const files = await r.json();
    files.filter(f => f.name.endsWith('.json')).forEach(f => {
      const o = document.createElement('option');
      o.value = f.name; o.textContent = f.name.replace('.json', '');
      sel.appendChild(o);
    });
    if (sel.options.length) await loadFile(sel.options[0].value);
    else { setStatus('JSONなし'); $('#loadingView').innerHTML = '<div class="empty-state">dialogue/ にJSONがありません</div>'; }
  } catch (e) {
    setStatus('GitHub接続エラー');
    $('#loadingView').innerHTML = '<div class="empty-state">接続失敗<br><br><button class="btn btn-save" onclick="document.getElementById(\'fileInput\').click()">ファイルを開く</button></div>';
  }
}

async function loadFile(f) {
  fname = f; setStatus('読み込み中...');
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BR}/${DIR}/${f}`);
    if (!r.ok) throw new Error(r.status);
    applyData(await r.json(), f);
  } catch (e) { setStatus('エラー: ' + e.message); }
}

function applyData(d, f, skipBackupCheck) {
  data = d; dirty = false; undoStack = []; redoStack = [];
  fname = f;
  $('#chapterName').textContent = data.chapter || '';
  const lv = $('#loadingView');
  if (lv) lv.remove();

  // localStorageにバックアップがあれば復元を提案
  if (!skipBackupCheck) {
    try {
      const saved = localStorage.getItem('roa_' + f);
      if (saved) {
        const { data: bkData, t } = JSON.parse(saved);
        const ago = Math.round((Date.now() - t) / 60000);
        if (ago < 1440 && bkData && bkData.events && confirm(`${ago}分前の未保存バックアップがあります。復元しますか？`)) {
          data = bkData; dirty = true;
        }
        localStorage.removeItem('roa_' + f);
      }
    } catch (e) {}
  }

  render();
  setStatus(dirty ? '● 未保存（復元済み）' : f);
}

// ══════════ ビュー導出 ══════════

function getSayEntries() {
  if (!data || !data.events) return [];
  return data.events.map((ev, i) => ({ ev, idx: i })).filter(({ ev }) => ev.type === 'say');
}

// ══════════ レンダリング ══════════

function render() {
  const entries = getSayEntries();
  const total = entries.length;
  $('#countBadge').textContent = total + ' セリフ';

  const inner = $('#listInner');
  inner.innerHTML = '';

  if (!total) {
    inner.innerHTML = '<div class="empty-state">セリフがありません<div class="hint">右下の「+ セリフ追加」ボタンで追加しましょう</div></div>';
    return;
  }

  const frag = document.createDocumentFragment();
  entries.forEach(({ ev, idx }, displayNum) => {
    // カード間の挿入ボタン（最初のカードの前にも配置）
    if (displayNum === 0) frag.appendChild(mkInsertGap(idx));
    frag.appendChild(mkCard(ev, idx, displayNum + 1, total));
    frag.appendChild(mkInsertGap(idx + 1));
  });
  inner.appendChild(frag);
}

function mkCard(ev, origIdx, num, total) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.idx = origIdx;

  // ── ヘッダー ──
  const head = document.createElement('div');
  head.className = 'card-head';

  const grip = document.createElement('span');
  grip.className = 'grip'; grip.textContent = '⠿'; grip.draggable = true;
  grip.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(origIdx));
    card.classList.add('dragging');
  });
  grip.addEventListener('dragend', () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging', 'drop-above', 'drop-below'));
  });

  card.addEventListener('dragover', e => {
    e.preventDefault();
    card.classList.remove('drop-above', 'drop-below');
    const rect = card.getBoundingClientRect();
    card.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drop-above' : 'drop-below');
  });
  card.addEventListener('dragleave', () => card.classList.remove('drop-above', 'drop-below'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drop-above', 'drop-below');
    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
    const toIdx = origIdx;
    if (isNaN(fromIdx) || fromIdx === toIdx) return;
    const rect = card.getBoundingClientRect();
    const insertAfter = e.clientY >= rect.top + rect.height / 2;
    pushUndoImmediate();
    const [removed] = data.events.splice(fromIdx, 1);
    let insertPos = insertAfter ? toIdx : toIdx;
    if (fromIdx < toIdx) insertPos--;
    if (insertAfter) insertPos++;
    data.events.splice(insertPos, 0, removed);
    markDirty(); render();
  });

  const numLabel = document.createElement('span');
  numLabel.className = 'card-num';
  numLabel.textContent = `#${num} / ${total}`;

  const spacer = document.createElement('div');
  spacer.className = 'spacer';

  const voiceBadge = document.createElement('span');
  voiceBadge.className = 'voice-badge' + (ev.voice ? '' : ' empty');
  voiceBadge.textContent = ev.voice || '未設定';

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-del'; delBtn.textContent = '×'; delBtn.title = '削除';
  delBtn.addEventListener('click', () => deleteSay(origIdx));

  head.append(grip, numLabel, spacer, voiceBadge, delBtn);

  // ── ボディ ──
  const body = document.createElement('div');

  // セリフテキスト
  const textArea = document.createElement('textarea');
  textArea.className = 'field-text';
  textArea.value = ev.text || '';
  textArea.placeholder = 'セリフを入力...';
  textArea.rows = 1;
  textArea.addEventListener('input', () => {
    pushUndo(); data.events[origIdx].text = textArea.value; markDirty();
    autoResize(textArea);
  });
  requestAnimationFrame(() => autoResize(textArea));

  // 読みセクション
  const readingSec = document.createElement('div');
  readingSec.className = 'reading-section';

  const readingToggle = document.createElement('button');
  readingToggle.className = 'reading-toggle';
  const hasReading = ev.reading && ev.reading.length > 0;
  readingToggle.textContent = hasReading ? '読み（発音指定）▲' : '読み（発音指定）▼';

  const readingBody = document.createElement('div');
  readingBody.className = 'reading-body';
  readingBody.hidden = !hasReading;

  const readingArea = document.createElement('textarea');
  readingArea.className = 'field-reading';
  readingArea.value = ev.reading || '';
  readingArea.placeholder = 'VOICEVOXに送る読みを入力（空欄＝セリフと同じ）';
  readingArea.rows = 1;
  readingArea.addEventListener('input', () => {
    pushUndo(); data.events[origIdx].reading = readingArea.value || undefined; markDirty();
    autoResize(readingArea);
  });
  requestAnimationFrame(() => autoResize(readingArea));

  readingToggle.addEventListener('click', () => {
    readingBody.hidden = !readingBody.hidden;
    readingToggle.textContent = readingBody.hidden ? '読み（発音指定）▼' : '読み（発音指定）▲';
    if (!readingBody.hidden) { readingArea.focus(); autoResize(readingArea); }
  });

  readingBody.appendChild(readingArea);
  readingSec.append(readingToggle, readingBody);

  // Voice ID 編集
  const voiceEdit = document.createElement('div');
  voiceEdit.className = 'voice-edit';

  const voiceLabel = document.createElement('span');
  voiceLabel.className = 'voice-label'; voiceLabel.textContent = 'Voice ID';

  const voiceInput = document.createElement('input');
  voiceInput.type = 'text'; voiceInput.className = 'field-voice';
  voiceInput.value = ev.voice || '';
  voiceInput.placeholder = 'v001';
  voiceInput.addEventListener('input', () => {
    pushUndo(); data.events[origIdx].voice = voiceInput.value; markDirty();
    voiceBadge.textContent = voiceInput.value || '未設定';
    voiceBadge.className = 'voice-badge' + (voiceInput.value ? '' : ' empty');
  });

  voiceEdit.append(voiceLabel, voiceInput);

  body.append(textArea, readingSec, voiceEdit);
  card.append(head, body);
  return card;
}

function mkInsertGap(insertIdx) {
  const gap = document.createElement('div');
  gap.className = 'insert-gap';
  const btn = document.createElement('button');
  btn.className = 'insert-btn'; btn.textContent = '+'; btn.title = 'ここにセリフを追加';
  btn.addEventListener('click', () => addSayAt(insertIdx));
  gap.appendChild(btn);
  return gap;
}

// ══════════ CRUD ══════════

function nextVoiceId() {
  let max = 0;
  if (data && data.events) {
    for (const ev of data.events) {
      if (ev.voice) {
        const m = ev.voice.match(/^v(\d+)$/);
        if (m) max = Math.max(max, parseInt(m[1], 10));
      }
    }
  }
  return 'v' + String(max + 1).padStart(3, '0');
}

function addSay() {
  pushUndoImmediate();
  const entries = getSayEntries();
  const insertIdx = entries.length > 0 ? entries[entries.length - 1].idx + 1 : (data.events ? data.events.length : 0);
  const newEv = { type: 'say', text: '', voice: nextVoiceId() };
  data.events.splice(insertIdx, 0, newEv);
  markDirty(); render();
  // 新しいカードにスクロール＆フォーカス
  requestAnimationFrame(() => {
    const cards = document.querySelectorAll('.card');
    const last = cards[cards.length - 1];
    if (last) {
      last.scrollIntoView({ block: 'center', behavior: 'smooth' });
      const ta = last.querySelector('.field-text');
      if (ta) setTimeout(() => ta.focus(), 300);
    }
  });
  toast('セリフを追加しました');
}

function addSayAt(insertIdx) {
  pushUndoImmediate();
  const newEv = { type: 'say', text: '', voice: nextVoiceId() };
  data.events.splice(insertIdx, 0, newEv);
  markDirty(); render();
  // 挿入したカードにフォーカス
  requestAnimationFrame(() => {
    const card = document.querySelector(`.card[data-idx="${insertIdx}"]`);
    if (card) {
      card.scrollIntoView({ block: 'center', behavior: 'smooth' });
      const ta = card.querySelector('.field-text');
      if (ta) setTimeout(() => ta.focus(), 300);
    }
  });
  toast('セリフを追加しました');
}

function deleteSay(origIdx) {
  pushUndoImmediate();
  data.events.splice(origIdx, 1);
  markDirty(); render();
  toast('セリフを削除しました（Ctrl+Z で戻す）');
}

// ══════════ Undo / Redo ══════════

function pushUndo() {
  // テキスト入力中は500ms後にまとめて1回だけスナップショット
  if (_undoTimer) { clearTimeout(_undoTimer); _undoTimer = null; }
  if (!_undoPending) {
    undoStack.push(JSON.stringify(data.events));
    if (undoStack.length > 80) undoStack.shift();
    redoStack = [];
    _undoPending = true;
  }
  _undoTimer = setTimeout(() => { _undoPending = false; }, 500);
}
function pushUndoImmediate() {
  // 削除・並べ替え等の即時操作用
  _undoPending = false;
  if (_undoTimer) { clearTimeout(_undoTimer); _undoTimer = null; }
  undoStack.push(JSON.stringify(data.events));
  if (undoStack.length > 80) undoStack.shift();
  redoStack = [];
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(data.events));
  data.events = JSON.parse(undoStack.pop());
  markDirty(); render();
  toast('元に戻しました');
}

function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(data.events));
  data.events = JSON.parse(redoStack.pop());
  markDirty(); render();
  toast('やり直し');
}

// ══════════ 保存 / 読み込み ══════════

function exportJSON() {
  return JSON.stringify(data, null, '\t');
}

function downloadJSON() {
  const blob = new Blob([exportJSON()], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname || 'dialogue.json';
  a.click();
  URL.revokeObjectURL(a.href);
  dirty = false;
  setStatus(fname);
  toast('保存しました');
}

function loadLocal(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.events) { alert('"events" が見つかりません'); return; }
      applyData(d, file.name);
      toast('読み込み完了');
    } catch (err) { alert('JSONエラー: ' + err.message); }
  };
  reader.readAsText(file);
}

// ══════════ ユーティリティ ══════════

function markDirty() {
  dirty = true;
  setStatus('● 未保存');
  try { localStorage.setItem('roa_' + fname, JSON.stringify({ data, t: Date.now() })); } catch (e) {}
}

function setStatus(msg) {
  const el = $('#statusMsg');
  el.textContent = msg;
  el.className = dirty ? 'dirty' : '';
}

function toast(msg, dur = 2500) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ══════════ バインド ══════════

function bindAll() {
  // ファイル選択
  $('#fileSel').addEventListener('change', async () => {
    if (dirty && !confirm('未保存の変更があります。切り替えますか？')) {
      $('#fileSel').value = fname; return;
    }
    await loadFile($('#fileSel').value);
  });

  // 保存 / 開く
  $('#btnSave').addEventListener('click', downloadJSON);
  $('#btnOpen').addEventListener('click', () => $('#fileInput').click());
  $('#fileInput').addEventListener('change', () => {
    if ($('#fileInput').files.length) loadLocal($('#fileInput').files[0]);
  });

  // FAB
  $('#btnAdd').addEventListener('click', addSay);

  // キーボードショートカット
  document.addEventListener('keydown', e => {
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key === 's' && !e.shiftKey) { e.preventDefault(); downloadJSON(); }
    if (ctrl && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
    if (ctrl && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
  });

  // ドラッグ&ドロップ（ファイル読み込み）
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.json')) {
      if (!dirty || confirm('未保存です。読み込みますか？')) loadLocal(f);
    }
  });

  // 閉じる前の確認
  window.addEventListener('beforeunload', e => {
    if (dirty) { e.preventDefault(); e.returnValue = ''; }
  });
}
</script>
