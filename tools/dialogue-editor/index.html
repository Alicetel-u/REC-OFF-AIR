<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC:OFF:AIR Dialogue Editor</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{
  --bg0:#0a0e17;--bg1:#111827;--bg2:#1e293b;--bg3:#334155;
  --tx0:#f1f5f9;--tx1:#94a3b8;--tx2:#64748b;--tx3:#475569;
  --red:#ef4444;--redD:#7f1d1d;--grn:#22c55e;--grnD:#14532d;
  --blu:#3b82f6;--bluD:#1e3a5f;--ylw:#eab308;--ylwD:#713f12;
  --pur:#a855f7;--org:#f97316;--cyn:#06b6d4;--pnk:#ec4899;
  --accent:#ef4444;--accentG:linear-gradient(135deg,#ef4444,#f97316);
  --radius:8px;--shadow:0 4px 24px rgba(0,0,0,.4);
  --font:'Segoe UI','Meiryo','Noto Sans JP',system-ui,sans-serif;
  --mono:'Cascadia Code','Consolas','Noto Sans JP',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:var(--font);background:var(--bg0);color:var(--tx0);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font);font-size:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::selection{background:var(--accent);color:#fff}

.hdr{background:var(--bg1);padding:0 16px;display:flex;align-items:center;height:44px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:10px;backdrop-filter:blur(12px);position:relative;z-index:10}
.logo{font-size:1.1rem;font-weight:800;background:var(--accentG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px;white-space:nowrap}
.hdr select{background:var(--bg2);color:var(--tx0);border:1px solid var(--bg3);border-radius:var(--radius);padding:4px 8px;font-size:.82rem}
.hdr .ch{color:var(--tx2);font-size:.78rem}
.hdr .sep{width:1px;height:20px;background:var(--bg3)}
.badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-off{background:var(--bg3);color:var(--tx2)}.badge-on{background:var(--grnD);color:var(--grn)}
.spacer{flex:1}

.tbar{background:var(--bg1);padding:5px 16px;display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;flex-wrap:wrap}
.tabs{display:flex;gap:1px;background:var(--bg3);border-radius:var(--radius);overflow:hidden;margin-right:6px}
.tab{padding:5px 14px;background:var(--bg2);color:var(--tx2);border:none;font-size:.78rem;font-weight:500;transition:all .15s}
.tab:hover{color:var(--tx0);background:var(--bg3)}
.tab.on{background:var(--accent);color:#fff;font-weight:700}
.tab .cnt{display:inline-block;min-width:16px;height:16px;line-height:16px;background:rgba(255,255,255,.15);border-radius:8px;font-size:.65rem;text-align:center;margin-left:4px;padding:0 4px}
.tab.on .cnt{background:rgba(255,255,255,.3)}

.btn{padding:4px 10px;border:1px solid var(--bg3);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:.78rem;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bg3);color:var(--tx0);border-color:var(--tx2)}
.btn-g{background:var(--grnD);border-color:var(--grn);color:var(--grn)}.btn-g:hover{background:var(--grn);color:#fff}
.btn-r{background:var(--redD);border-color:var(--red);color:var(--red)}.btn-r:hover{background:var(--red);color:#fff}
.btn-b{background:var(--bluD);border-color:var(--blu);color:var(--blu)}.btn-b:hover{background:var(--blu);color:#fff}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}.btn-accent:hover{filter:brightness(1.2)}
.divider{width:1px;height:20px;background:var(--bg3);margin:0 4px}

.search-box{position:relative;display:flex;align-items:center}
.search-box input{background:var(--bg0);border:1px solid var(--bg3);color:var(--tx0);border-radius:var(--radius);padding:4px 8px 4px 26px;font-size:.78rem;width:180px;transition:all .2s}
.search-box input:focus{outline:none;border-color:var(--accent);width:240px}
.search-box .ico{position:absolute;left:8px;color:var(--tx2);font-size:.75rem;pointer-events:none}

.main{display:flex;flex:1;overflow:hidden}
.editor{flex:1;overflow-y:auto;padding:4px 8px 80px;scroll-behavior:smooth}
.sidebar{width:340px;border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;background:var(--bg1);flex-shrink:0;transition:width .2s;overflow:hidden}
.sidebar.closed{width:0;border:none}
.side-tabs{display:flex;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06)}
.side-tab{flex:1;padding:8px;text-align:center;font-size:.75rem;color:var(--tx2);border:none;background:none;transition:all .12s;border-bottom:2px solid transparent}
.side-tab:hover{color:var(--tx0)}.side-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.side-content{flex:1;overflow-y:auto;padding:8px}

.ev{display:flex;align-items:center;gap:3px;padding:3px 6px;margin:1px 0;border-radius:6px;min-height:32px;transition:all .12s;border:1px solid transparent;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ev:hover{border-color:rgba(255,255,255,.06)}
.ev.sel{border-color:var(--accent)!important;background:rgba(239,68,68,.08)!important}
.ev .grip{cursor:grab;color:var(--bg3);user-select:none;font-size:.85rem;flex-shrink:0;width:16px;text-align:center;transition:color .1s}
.ev:hover .grip{color:var(--tx2)}
.ev .num{width:26px;text-align:right;color:var(--tx3);font-size:.7rem;flex-shrink:0;font-variant-numeric:tabular-nums}
.ev .tag{width:56px;font-size:.6rem;font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px;padding:2px 0;text-align:center;border-radius:4px}
.ev .fields{flex:1;display:flex;align-items:center;gap:4px;min-width:0}
.ev .acts{display:flex;gap:1px;flex-shrink:0;opacity:0;transition:opacity .15s}
.ev:hover .acts{opacity:1}

.fi{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);color:var(--tx0);padding:3px 6px;border-radius:4px;font-size:.82rem;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--accent)}
.fi.grow{flex:1;min-width:40px}.fi.w80{width:80px}.fi.w60{width:60px}
.fl{color:var(--tx3);font-size:.68rem;flex-shrink:0}

.ab{width:22px;height:22px;border:none;border-radius:4px;background:transparent;color:var(--tx3);font-size:.72rem;display:flex;align-items:center;justify-content:center;transition:all .1s}
.ab:hover{background:var(--bg3);color:var(--tx0)}.ab.x:hover{background:var(--red);color:#fff}

.r-say{background:rgba(249,115,22,.08)}.r-say .tag{background:rgba(249,115,22,.2);color:var(--org)}
.r-say_clear{background:rgba(249,115,22,.04)}.r-say_clear .tag{background:rgba(249,115,22,.1);color:#b45309}
.r-chat{background:rgba(59,130,246,.08)}.r-chat .tag{background:rgba(59,130,246,.2);color:var(--blu)}
.r-wait{background:rgba(148,163,184,.05)}.r-wait .tag{background:rgba(148,163,184,.1);color:var(--tx2)}
.r-rot_y{background:rgba(34,197,94,.06)}.r-rot_y .tag{background:rgba(34,197,94,.15);color:var(--grn)}
.r-head_x{background:rgba(34,197,94,.04)}.r-head_x .tag{background:rgba(34,197,94,.1);color:#16a34a}
.r-pos_z{background:rgba(6,182,212,.06)}.r-pos_z .tag{background:rgba(6,182,212,.15);color:var(--cyn)}
.r-pos_z_await{background:rgba(6,182,212,.04)}.r-pos_z_await .tag{background:rgba(6,182,212,.1);color:#0891b2}
.r-walk_set{background:rgba(234,179,8,.06)}.r-walk_set .tag{background:rgba(234,179,8,.15);color:var(--ylw)}
.r-flashlight_on{background:rgba(234,179,8,.08)}.r-flashlight_on .tag{background:rgba(234,179,8,.2);color:#facc15}

.ev.dragging{opacity:.2}.ev.dt{border-top:2px solid var(--accent)}.ev.db{border-bottom:2px solid var(--accent)}
.ev.hl{animation:hlPulse .6s ease}
@keyframes hlPulse{0%,100%{background:inherit}50%{background:rgba(239,68,68,.15)}}
.empty-msg{text-align:center;color:var(--tx3);padding:40px;font-size:.9rem}

.pv-box{background:#000;flex:1;overflow:hidden;position:relative;min-height:0}
.pv-screen{height:100%;display:flex;position:relative}
.pv-game{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;position:relative}
.pv-rec{position:absolute;top:8px;left:12px;color:var(--red);font-size:.7rem;font-weight:700;display:flex;align-items:center;gap:4px}
.pv-rec::before{content:'';width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pv-timer{position:absolute;top:8px;right:8px;color:rgba(255,255,255,.5);font-size:.65rem;font-family:var(--mono)}
.pv-sub{background:rgba(0,0,0,.8);color:#fff;padding:6px 10px;border-radius:6px;font-size:.8rem;line-height:1.5;display:none;max-width:90%;border-left:3px solid var(--org);backdrop-filter:blur(4px)}
.pv-chat{width:140px;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;overflow:hidden;padding:4px;background:rgba(0,0,0,.4)}
.pv-chat .msg{font-size:.62rem;line-height:1.3;animation:chatIn .3s ease}
@keyframes chatIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pv-chat .msg .u{font-weight:700;margin-right:3px}
.pv-ctrl{padding:6px 10px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:6px}
.pv-ctrl .time{font-size:.72rem;color:var(--tx2);font-variant-numeric:tabular-nums;font-family:var(--mono);min-width:36px}
.pv-progress{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;cursor:pointer}
.pv-progress-bar{height:100%;background:var(--accent);width:0%;transition:width .1s}

.stat-card{background:var(--bg2);border-radius:var(--radius);padding:10px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04)}
.stat-card h3{font-size:.72rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.8rem}
.stat-row .v{color:var(--tx0);font-weight:600;font-family:var(--mono)}.stat-row .l{color:var(--tx2)}
.char-bar{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.75rem}
.char-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.char-bar .name{flex:1;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.char-bar .count{color:var(--tx2);font-family:var(--mono);font-size:.7rem}

.script-view{background:var(--bg0);border-radius:var(--radius);padding:10px;font-family:var(--mono);font-size:.78rem;line-height:1.8;white-space:pre-wrap;word-break:break-all;color:var(--tx1);max-height:60vh;overflow-y:auto}
.script-view .s-say{color:var(--org);font-weight:600}
.script-view .s-chat{color:var(--blu)}
.script-view .s-dir{color:var(--tx3);font-style:italic;font-size:.7rem}
.script-view .s-wait{color:var(--tx3)}

.ftr{background:var(--bg1);border-top:1px solid rgba(255,255,255,.06);padding:3px 16px;display:flex;align-items:center;gap:10px;font-size:.72rem;color:var(--tx3);flex-shrink:0;height:28px}
.ftr .dirty{color:var(--ylw);font-weight:600}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);color:var(--tx0);padding:8px 20px;border-radius:var(--radius);font-size:.82rem;opacity:0;transition:all .3s;pointer-events:none;z-index:999;border:1px solid rgba(255,255,255,.1);box-shadow:var(--shadow);backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.menu{display:none;position:fixed;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:4px;z-index:99;min-width:200px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
.menu button{display:flex;width:100%;align-items:center;gap:8px;text-align:left;padding:6px 10px;background:none;border:none;color:var(--tx1);font-size:.8rem;border-radius:4px;transition:all .1s}
.menu button:hover{background:var(--bg3);color:var(--tx0)}
.menu button .k{margin-left:auto;font-size:.65rem;color:var(--tx3);font-family:var(--mono)}
.menu .sep{height:1px;background:var(--bg3);margin:3px 4px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--bg1);border:1px solid var(--bg3);border-radius:12px;padding:20px;min-width:400px;max-width:90vw;box-shadow:var(--shadow)}
.modal h2{font-size:1rem;margin-bottom:12px;color:var(--tx0)}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:12px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--tx2)}
.spinner{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <span class="logo">REC:OFF:AIR</span>
  <div class="sep"></div>
  <select id="fileSel"></select>
  <span class="ch" id="chName"></span>
  <div class="spacer"></div>
  <span class="badge badge-off" id="fbBadge">Firebase OFF</span>
  <button class="btn" id="btnSidebar">|||</button>
</div>

<div class="tbar">
  <div class="tabs">
    <button class="tab on" data-m="all">すべて<span class="cnt" id="cntAll">0</span></button>
    <button class="tab" data-m="say">セリフ<span class="cnt" id="cntSay">0</span></button>
    <button class="tab" data-m="chat">チャット<span class="cnt" id="cntChat">0</span></button>
  </div>
  <div class="search-box"><span class="ico">&#128269;</span><input type="text" id="searchInput" placeholder="検索… (Ctrl+F)"></div>
  <div class="divider"></div>
  <button class="btn btn-g" id="addSay">+ セリフ</button>
  <button class="btn btn-b" id="addChat">+ チャット</button>
  <button class="btn" id="addWait">+ 待機</button>
  <button class="btn" id="addMore">+ その他 ▾</button>
  <div class="divider"></div>
  <label class="btn" style="gap:3px"><input type="checkbox" id="autoWait" checked> auto-wait</label>
  <div class="spacer"></div>
  <span id="countInfo" style="font-size:.72rem;color:var(--tx3)"></span>
  <div class="divider"></div>
  <button class="btn" id="btnCopy">📋 コピー</button>
  <button class="btn btn-accent" id="btnDL">💾 保存</button>
  <button class="btn" id="btnScript">📝 台本</button>
  <button class="btn" id="btnFile">📂 開く</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<div class="main">
  <div class="editor" id="editorPane">
    <div class="loading" id="loadingView"><div class="spinner"></div><div>読み込み中…</div></div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="side-tabs">
      <button class="side-tab on" data-p="preview">プレビュー</button>
      <button class="side-tab" data-p="stats">統計</button>
      <button class="side-tab" data-p="chars">キャラ</button>
    </div>
    <div class="side-content" id="panelPreview" style="padding:0;display:flex;flex-direction:column">
      <div class="pv-box"><div class="pv-screen"><div class="pv-game"><div class="pv-rec" id="pvRec" style="display:none">REC</div><div class="pv-timer" id="pvTimerDisp">00:00:00</div><div class="pv-sub" id="pvSub"></div></div><div class="pv-chat" id="pvChat"></div></div></div>
      <div class="pv-ctrl"><button class="btn" id="pvPlay">▶</button><button class="btn" id="pvStop">■</button><span class="time" id="pvTime">0:00</span><div class="pv-progress" id="pvProg"><div class="pv-progress-bar" id="pvProgBar"></div></div><select class="fi" id="pvSpeed" style="width:50px;font-size:.7rem"><option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="2">2x</option><option value="3">3x</option><option value="5">5x</option></select></div>
    </div>
    <div class="side-content" id="panelStats" style="display:none"></div>
    <div class="side-content" id="panelChars" style="display:none"></div>
  </div>
</div>

<div class="ftr"><span id="statusMsg">起動中…</span><div class="spacer"></div><span>Ctrl+S 保存 / Ctrl+Z 戻す / Ctrl+Y やり直す / Ctrl+F 検索 / Enter 次行追加</span></div>

<div class="menu" id="moreMenu">
  <button data-add="say_clear">say_clear<span class="k">セリフ消去</span></button>
  <button data-add="rot_y">rot_y<span class="k">左右回転</span></button>
  <button data-add="head_x">head_x<span class="k">首振り</span></button>
  <div class="sep"></div>
  <button data-add="pos_z">pos_z<span class="k">前後移動</span></button>
  <button data-add="pos_z_await">pos_z_await<span class="k">移動待ち</span></button>
  <button data-add="walk_set">walk_set<span class="k">歩行切替</span></button>
  <div class="sep"></div>
  <button data-add="flashlight_on">flashlight_on<span class="k">ライトON</span></button>
</div>

<div class="menu" id="ctxMenu">
  <button id="ctxDup">複製<span class="k">Ctrl+D</span></button>
  <button id="ctxInsAbove">↑ 上に挿入</button>
  <button id="ctxInsBelow">↓ 下に挿入</button>
  <div class="sep"></div>
  <button id="ctxSelAll">すべて選択</button>
  <button id="ctxDelSel" style="color:var(--red)">選択を削除<span class="k">Del</span></button>
</div>

<div class="modal-bg" id="scriptModal">
  <div class="modal">
    <h2>台本プレビュー</h2>
    <div class="script-view" id="scriptContent"></div>
    <div class="modal-actions">
      <button class="btn" id="scriptCopy">📋 台本をコピー</button>
      <button class="btn" onclick="document.getElementById('scriptModal').classList.remove('show')">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER='Alicetel-u',REPO='REC-OFF-AIR',BR='master',DIR='dialogue';
const FIREBASE_CONFIG=null;

let data=null,events=[],mode='all',dirty=false,fname='',undoS=[],redoS=[];
let selected=new Set(),ctxIdx=-1,searchQ='',db=null;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

(async()=>{initFB();await loadFL();bindAll();})();

function initFB(){if(!FIREBASE_CONFIG)return;try{firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();firebase.auth().signInAnonymously();$('#fbBadge').textContent='Firebase ON';$('#fbBadge').className='badge badge-on';}catch(e){}}
async function fbSave(f,d){if(!db)return;try{await db.collection('dialogues').doc(f).set({data:JSON.stringify(d),t:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}}
function fbListen(f,cb){if(!db)return;db.collection('dialogues').doc(f).onSnapshot(s=>{if(s.exists&&!dirty)try{cb(JSON.parse(s.data().data));}catch(e){}});}

async function loadFL(){
  const sel=$('#fileSel');
  try{
    const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}?ref=${BR}`);
    if(!r.ok)throw new Error(r.status);
    const files=await r.json();
    files.filter(f=>f.name.endsWith('.json')).forEach(f=>{const o=document.createElement('option');o.value=f.name;o.textContent=f.name.replace('.json','');sel.appendChild(o);});
    if(sel.options.length)await loadF(sel.options[0].value);
    else{st('JSONなし');$('#loadingView').innerHTML='<div class="empty-msg">dialogue/ にJSONがありません</div>';}
  }catch(e){st('GitHub接続エラー');$('#loadingView').innerHTML='<div class="empty-msg">接続失敗<br><br><button class="btn btn-accent" onclick="document.getElementById(\'fileInput\').click()">📂 ファイルを開く</button></div>';}
}

async function loadF(f){
  fname=f;st('読み込み中…');
  try{const r=await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BR}/${DIR}/${f}`);if(!r.ok)throw new Error(r.status);apply(await r.json(),f);}
  catch(e){st('エラー: '+e.message);}
  fbListen(f,d=>{apply(d,f);toast('リアルタイム更新');});
}

function apply(d,f){data=d;events=data.events||[];dirty=false;undoS=[];redoS=[];selected.clear();fname=f;$('#chName').textContent=data.chapter||'';$('#loadingView')?.remove();render();updStats();updChars();st(`${f} — ${events.length}件`);try{localStorage.setItem('roa_'+f,JSON.stringify({data,t:Date.now()}));}catch(e){}}

function render(){
  const p=$('#editorPane');p.innerHTML='';const q=searchQ.toLowerCase();
  const filt=events.map((ev,i)=>({ev,i})).filter(({ev})=>{
    if(mode!=='all'&&ev.type!==mode)return false;
    if(q){const t=(ev.text||'')+(ev.msg||'')+(ev.user||'');if(!t.toLowerCase().includes(q))return false;}
    return true;
  });
  $('#cntAll').textContent=events.length;
  $('#cntSay').textContent=events.filter(e=>e.type==='say').length;
  $('#cntChat').textContent=events.filter(e=>e.type==='chat').length;
  if(!filt.length){p.innerHTML=`<div class="empty-msg">${searchQ?'検索結果なし':'イベントがありません'}</div>`;updInfo();return;}
  const fr=document.createDocumentFragment();filt.forEach(({ev,i})=>fr.appendChild(mkRow(ev,i)));p.appendChild(fr);updInfo();
}

function mkRow(ev,ri){
  const r=document.createElement('div');r.className=`ev r-${ev.type||'unknown'}`;r.dataset.idx=ri;
  if(selected.has(ri))r.classList.add('sel');
  r.addEventListener('click',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;if(e.ctrlKey||e.metaKey){selected.has(ri)?selected.delete(ri):selected.add(ri);r.classList.toggle('sel');}});
  r.addEventListener('contextmenu',e=>{e.preventDefault();ctxIdx=ri;showCtx(e.clientX,e.clientY);});
  const grip=ce('span','grip','⠿');grip.draggable=true;
  grip.addEventListener('dragstart',dsE);grip.addEventListener('dragend',deE);
  r.addEventListener('dragover',doE);r.addEventListener('dragleave',dlE);r.addEventListener('drop',ddE);
  const fields=ce('div','fields');buildF(fields,ev,ri);
  const acts=ce('div','acts');
  acts.appendChild(ab('⬆',()=>mv(ri,-1)));acts.appendChild(ab('⬇',()=>mv(ri,1)));acts.appendChild(ab('📋',()=>dup(ri)));acts.appendChild(ab('✕',()=>del(ri),true));
  r.append(grip,ce('span','num',String(ri+1)),ce('span','tag',ev.type||'?'),fields,acts);
  return r;
}

function buildF(c,ev,i){
  switch(ev.type){
    case'say':c.appendChild(fi(i,'text',ev.text||'','セリフを入力…',true));break;
    case'chat':c.appendChild(fi(i,'msg',ev.msg||'','メッセージ…',true));c.appendChild(fl('user:'));c.appendChild(fi(i,'user',ev.user||'','ユーザー名',false,'w80'));break;
    case'wait':c.appendChild(fn(i,'sec',ev.sec??0.5,0,30,0.1));c.appendChild(fl('秒'));break;
    case'rot_y':case'head_x':c.appendChild(fl('t:'));c.appendChild(fn(i,'target',ev.target??0,-6.28,6.28,0.01));c.appendChild(fl('d:'));c.appendChild(fn(i,'dur',ev.dur??1,0.05,30,0.05));c.appendChild(fl('s'));break;
    case'pos_z':c.appendChild(fl('t:'));c.appendChild(fn(i,'target',ev.target??0,-200,200,0.5));c.appendChild(fl('d:'));c.appendChild(fn(i,'dur',ev.dur??5,0.1,60,0.1));c.appendChild(fl('s'));c.appendChild(fl('id:'));c.appendChild(fi(i,'id',ev.id||'','walk1',false,'w60'));break;
    case'pos_z_await':c.appendChild(fl('id:'));c.appendChild(fi(i,'id',ev.id||'','walk1',false,'w80'));break;
    case'walk_set':{const s=document.createElement('select');s.className='fi';s.innerHTML=`<option value="true"${ev.on?' selected':''}>ON 歩行</option><option value="false"${!ev.on?' selected':''}>OFF 停止</option>`;s.addEventListener('change',()=>{pU();events[i].on=s.value==='true';mD();});c.appendChild(s);break;}
    default:c.appendChild(fl('—'));
  }
}

function ce(t,c,x){const e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e;}
function fl(t){return ce('span','fl',t);}
function fi(i,k,v,ph,g,ex){const inp=document.createElement('input');inp.type='text';inp.className='fi'+(g?' grow':'')+(ex?' '+ex:'');inp.value=v;inp.placeholder=ph;inp.addEventListener('input',()=>{pU();events[i][k]=inp.value;mD();});inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addAfter(i);}});return inp;}
function fn(i,k,v,mn,mx,s){const inp=document.createElement('input');inp.type='number';inp.className='fi w60';inp.value=v;inp.min=mn;inp.max=mx;inp.step=s;inp.addEventListener('input',()=>{const n=parseFloat(inp.value);if(!isNaN(n)){pU();events[i][k]=n;mD();}});return inp;}
function ab(l,cb,d){const b=document.createElement('button');b.className='ab'+(d?' x':'');b.textContent=l;b.addEventListener('click',e=>{e.stopPropagation();cb();});return b;}

function mv(i,d){const n=i+d;if(n<0||n>=events.length)return;pU();[events[i],events[n]]=[events[n],events[i]];mD();render();}
function del(i){pU();events.splice(i,1);selected.delete(i);mD();render();}
function delSel(){if(!selected.size)return;pU();[...selected].sort((a,b)=>b-a).forEach(i=>events.splice(i,1));selected.clear();mD();render();toast('削除しました');}
function dup(i){pU();events.splice(i+1,0,JSON.parse(JSON.stringify(events[i])));mD();render();hl(i+1);}
function addAfter(i){
  const t=events[i]?.type==='say'?'say':events[i]?.type==='chat'?'chat':'say';
  pU();events.splice(i+1,0,newEv(t));
  if($('#autoWait').checked)events.splice(i+2,0,{type:'wait',sec:t==='say'?1.2:0.5});
  mD();render();setTimeout(()=>{const rows=$('#editorPane').querySelectorAll('.ev');rows.forEach(r=>{if(+r.dataset.idx===i+1){const inp=r.querySelector('input[type=text]');if(inp)inp.focus();}});},50);
}
function addEv(ev){
  pU();let pos=events.length;if(mode!=='all'){let last=-1;events.forEach((e,i)=>{if(e.type===mode)last=i;});if(last>=0)pos=last+1;}
  events.splice(pos,0,ev);if($('#autoWait').checked&&(ev.type==='say'||ev.type==='chat'))events.splice(pos+1,0,{type:'wait',sec:ev.type==='say'?1.2:0.5});
  mD();render();$('#editorPane').scrollTop=$('#editorPane').scrollHeight;hl(pos);
}
function newEv(t){const m={say:{type:'say',text:''},chat:{type:'chat',msg:'',user:'',utype:''},wait:{type:'wait',sec:0.5},say_clear:{type:'say_clear'},rot_y:{type:'rot_y',target:0,dur:1},head_x:{type:'head_x',target:0,dur:1},pos_z:{type:'pos_z',target:0,dur:5,id:'walk1'},pos_z_await:{type:'pos_z_await',id:'walk1'},walk_set:{type:'walk_set',on:true},flashlight_on:{type:'flashlight_on'}};return JSON.parse(JSON.stringify(m[t]||{type:t}));}
function hl(i){setTimeout(()=>{const r=$('#editorPane').querySelector(`[data-idx="${i}"]`);if(r){r.classList.add('hl');r.scrollIntoView({block:'nearest',behavior:'smooth'});}},50);}

function pU(){undoS.push(JSON.stringify(events));if(undoS.length>80)undoS.shift();redoS=[];}
function doU(){if(!undoS.length)return;redoS.push(JSON.stringify(events));events=JSON.parse(undoS.pop());data.events=events;mD();render();toast('元に戻しました');}
function doR(){if(!redoS.length)return;undoS.push(JSON.stringify(events));events=JSON.parse(redoS.pop());data.events=events;mD();render();toast('やり直し');}

let dragI=null;
function dsE(e){const r=e.target.closest('.ev');dragI=+r.dataset.idx;r.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','');}
function deE(){dragI=null;$$('.ev').forEach(r=>r.classList.remove('dragging','dt','db'));}
function doE(e){e.preventDefault();if(dragI===null)return;const r=e.target.closest('.ev');if(!r)return;const rc=r.getBoundingClientRect();r.classList.remove('dt','db');r.classList.add(e.clientY<rc.top+rc.height/2?'dt':'db');}
function dlE(e){const r=e.target.closest('.ev');if(r)r.classList.remove('dt','db');}
function ddE(e){e.preventDefault();if(dragI===null)return;const r=e.target.closest('.ev');if(!r)return;let ti=+r.dataset.idx;if(e.clientY>=r.getBoundingClientRect().top+r.getBoundingClientRect().height/2)ti++;if(dragI===ti||dragI+1===ti){deE();return;}pU();const[rm]=events.splice(dragI,1);events.splice(ti>dragI?ti-1:ti,0,rm);mD();render();}

function showCtx(x,y){const m=$('#ctxMenu');m.style.display='block';m.style.left=Math.min(x,innerWidth-220)+'px';m.style.top=Math.min(y,innerHeight-200)+'px';}

function expJ(){data.events=events;return JSON.stringify(data,null,'\t');}
function dlJ(){const b=new Blob([expJ()],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fname||'dialogue.json';a.click();URL.revokeObjectURL(a.href);dirty=false;st('保存完了');toast('ダウンロード完了');}
async function cpJ(){try{await navigator.clipboard.writeText(expJ());toast('JSONコピー完了');}catch{toast('コピー失敗');}}
function ldLocal(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.events){alert('"events"がありません');return;}apply(d,file.name);toast('読み込み完了');}catch(err){alert('JSONエラー: '+err.message);}};r.readAsText(file);}

function showScript(){
  const c=$('#scriptContent');let h='',n=0;
  events.forEach(ev=>{
    if(ev.type==='say'){n++;h+=`<span class="s-say">${n}. 【配信者】${esc(ev.text)}</span>\n`;}
    else if(ev.type==='chat'){n++;h+=`<span class="s-chat">${n}. [${esc(ev.user||'匿名')}] ${esc(ev.msg)}</span>\n`;}
    else if(ev.type==='wait')h+=`<span class="s-wait">    ... ${ev.sec}秒 ...\n</span>`;
    else if(ev.type!=='say_clear')h+=`<span class="s-dir">    (${ev.type})</span>\n`;
  });c.innerHTML=h;$('#scriptModal').classList.add('show');
}
function scriptTxt(){let t='',n=0;events.forEach(ev=>{if(ev.type==='say'){n++;t+=`${n}. 【配信者】${ev.text}\n`;}else if(ev.type==='chat'){n++;t+=`${n}. [${ev.user||'匿名'}] ${ev.msg}\n`;}else if(ev.type==='wait')t+=`    ... ${ev.sec}秒 ...\n`;else if(ev.type!=='say_clear')t+=`    (${ev.type})\n`;});return t;}

function updStats(){
  const p=$('#panelStats'),says=events.filter(e=>e.type==='say'),chats=events.filter(e=>e.type==='chat'),waits=events.filter(e=>e.type==='wait');
  const ts=waits.reduce((s,e)=>s+(e.sec||0),0),tc=says.reduce((s,e)=>s+(e.text||'').length,0)+chats.reduce((s,e)=>s+(e.msg||'').length,0);
  p.innerHTML=`<div class="stat-card"><h3>概要</h3><div class="stat-row"><span class="l">総イベント</span><span class="v">${events.length}</span></div><div class="stat-row"><span class="l">セリフ</span><span class="v" style="color:var(--org)">${says.length}</span></div><div class="stat-row"><span class="l">チャット</span><span class="v" style="color:var(--blu)">${chats.length}</span></div><div class="stat-row"><span class="l">演出</span><span class="v" style="color:var(--grn)">${events.filter(e=>!['say','chat','wait'].includes(e.type)).length}</span></div></div><div class="stat-card"><h3>時間</h3><div class="stat-row"><span class="l">wait合計</span><span class="v">${ts.toFixed(1)}s</span></div><div class="stat-row"><span class="l">推定再生</span><span class="v">${fmt(ts)}</span></div></div><div class="stat-card"><h3>テキスト</h3><div class="stat-row"><span class="l">総文字数</span><span class="v">${tc}</span></div><div class="stat-row"><span class="l">平均/セリフ</span><span class="v">${says.length?Math.round(tc/(says.length+chats.length)):0}</span></div></div>`;
}
function updChars(){
  const p=$('#panelChars'),map={};events.filter(e=>e.type==='chat').forEach(e=>{const u=e.user||'匿名';map[u]=(map[u]||0)+1;});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const cols=['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#06b6d4','#ec4899','#f97316'];
  let h='<div class="stat-card"><h3>チャットキャラクター ('+sorted.length+'人)</h3>';
  if(!sorted.length)h+='<div style="color:var(--tx3);font-size:.8rem;padding:8px 0">チャットなし</div>';
  sorted.forEach(([n,c],i)=>h+=`<div class="char-bar"><div class="dot" style="background:${cols[i%cols.length]}"></div><span class="name">${esc(n)}</span><span class="count">${c}件</span></div>`);
  p.innerHTML=h+'</div>';
}

let pvT=null,pvI=0,pvTm=0;
function pvPlay(){pvStop();pvI=0;pvTm=0;$('#pvChat').innerHTML='';$('#pvSub').style.display='none';$('#pvRec').style.display='flex';events.forEach(e=>delete e._a);pvT=setInterval(()=>pvTk(parseFloat($('#pvSpeed').value)||1),40);}
function pvStop(){if(pvT){clearInterval(pvT);pvT=null;}$('#pvRec').style.display='none';}
function pvTk(sp){
  pvTm+=0.04*sp;$('#pvTime').textContent=fmt(pvTm);$('#pvTimerDisp').textContent=fmtH(pvTm);
  const tot=events.filter(e=>e.type==='wait').reduce((s,e)=>s+(e.sec||0),0);
  $('#pvProgBar').style.width=(tot>0?Math.min(pvTm/tot*100,100):0)+'%';
  while(pvI<events.length){
    const ev=events[pvI];
    if(ev.type==='wait'){ev._a=(ev._a||0)+0.04*sp;if(ev._a<ev.sec)return;ev._a=0;pvI++;continue;}
    if(ev.type==='say'){$('#pvSub').textContent=ev.text;$('#pvSub').style.display='block';}
    else if(ev.type==='say_clear')$('#pvSub').style.display='none';
    else if(ev.type==='chat'){const a=$('#pvChat'),m=document.createElement('div');m.className='msg';const cols=['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#06b6d4','#ec4899'];m.innerHTML=`<span class="u" style="color:${cols[Math.abs(hsh(ev.user||''))%cols.length]}">${esc(ev.user||'匿名')}</span>${esc(ev.msg||'')}`;a.appendChild(m);if(a.children.length>40)a.removeChild(a.firstChild);a.scrollTop=a.scrollHeight;}
    pvI++;break;
  }
  if(pvI>=events.length){pvStop();toast('プレビュー終了');}
}

function mD(){dirty=true;data.events=events;st('● 未保存');try{localStorage.setItem('roa_'+fname,JSON.stringify({data,t:Date.now()}));}catch(e){}updStats();updChars();if(db)fbSave(fname,data);}
function st(m){const e=$('#statusMsg');e.textContent=m;e.className=dirty?'dirty':'';}
function updInfo(){$('#countInfo').textContent=`${events.length}件 / ${fmt(events.filter(e=>e.type==='wait').reduce((s,e)=>s+(e.sec||0),0))}`;}
function toast(m,d=2200){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function fmtH(s){return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s%3600/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');}
function hsh(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function bindAll(){
  $$('.tab').forEach(t=>t.addEventListener('click',()=>{$$('.tab').forEach(b=>b.classList.remove('on'));t.classList.add('on');mode=t.dataset.m;render();}));
  $$('.side-tab').forEach(t=>t.addEventListener('click',()=>{$$('.side-tab').forEach(b=>b.classList.remove('on'));t.classList.add('on');['Preview','Stats','Chars'].forEach(p=>{$('#panel'+p).style.display=t.dataset.p===p.toLowerCase()?'flex':'none';});}));
  $('#btnSidebar').addEventListener('click',()=>$('#sidebar').classList.toggle('closed'));
  $('#addSay').addEventListener('click',()=>addEv(newEv('say')));
  $('#addChat').addEventListener('click',()=>addEv(newEv('chat')));
  $('#addWait').addEventListener('click',()=>addEv(newEv('wait')));
  const mm=$('#moreMenu');
  $('#addMore').addEventListener('click',e=>{const r=e.target.getBoundingClientRect();mm.style.display='block';mm.style.left=r.left+'px';mm.style.top=(r.bottom+4)+'px';});
  mm.querySelectorAll('button[data-add]').forEach(b=>b.addEventListener('click',()=>{addEv(newEv(b.dataset.add));mm.style.display='none';}));
  const cm=$('#ctxMenu');
  $('#ctxDup').addEventListener('click',()=>{if(ctxIdx>=0)dup(ctxIdx);cm.style.display='none';});
  $('#ctxInsAbove').addEventListener('click',()=>{if(ctxIdx>=0){pU();events.splice(ctxIdx,0,newEv('say'));mD();render();}cm.style.display='none';});
  $('#ctxInsBelow').addEventListener('click',()=>{if(ctxIdx>=0)addAfter(ctxIdx);cm.style.display='none';});
  $('#ctxSelAll').addEventListener('click',()=>{events.forEach((_,i)=>selected.add(i));render();cm.style.display='none';});
  $('#ctxDelSel').addEventListener('click',()=>{delSel();cm.style.display='none';});
  document.addEventListener('click',e=>{if(!e.target.closest('#moreMenu')&&!e.target.closest('#addMore'))mm.style.display='none';if(!e.target.closest('#ctxMenu'))cm.style.display='none';});
  $('#searchInput').addEventListener('input',e=>{searchQ=e.target.value;render();});
  $('#btnDL').addEventListener('click',dlJ);$('#btnCopy').addEventListener('click',cpJ);
  $('#btnFile').addEventListener('click',()=>$('#fileInput').click());
  $('#fileInput').addEventListener('change',()=>{if($('#fileInput').files.length)ldLocal($('#fileInput').files[0]);});
  $('#fileSel').addEventListener('change',async()=>{if(dirty&&!confirm('未保存です。切り替えますか？')){$('#fileSel').value=fname;return;}await loadF($('#fileSel').value);});
  $('#btnScript').addEventListener('click',showScript);
  $('#scriptCopy').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(scriptTxt());toast('台本コピー完了');}catch{}});
  $('#pvPlay').addEventListener('click',pvPlay);$('#pvStop').addEventListener('click',pvStop);
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='s'&&!e.shiftKey){e.preventDefault();dlJ();}
    if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doU();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doR();}
    if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();$('#searchInput').focus();}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='S'){e.preventDefault();addEv(newEv('say'));}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='C'){e.preventDefault();addEv(newEv('chat'));}
    if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();if(selected.size===1)dup([...selected][0]);else if(ctxIdx>=0)dup(ctxIdx);}
    if(e.key==='Delete'&&selected.size&&document.activeElement.tagName!=='INPUT'){e.preventDefault();delSel();}
    if(e.key==='Escape'){selected.clear();render();cm.style.display='none';mm.style.display='none';$('#scriptModal').classList.remove('show');}
  });
  document.body.addEventListener('dragover',e=>e.preventDefault());
  document.body.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.json')){if(!dirty||confirm('未保存です。読み込みますか？'))ldLocal(f);}});
  window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});
}
</script>
</body>
