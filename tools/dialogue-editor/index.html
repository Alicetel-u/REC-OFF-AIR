<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC:OFF:AIR Dialogue Editor</title>

<!-- Firebase SDK (v9 compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
/* ══ Reset ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:'Segoe UI','Meiryo','Noto Sans JP',sans-serif;
  background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column;
}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}

/* ══ Layout ═════════════════════════════════════════ */
.app-header{
  background:#161b22;padding:8px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid #30363d;flex-shrink:0;
}
.app-header h1{font-size:1rem;color:#ff6b6b;font-weight:700;white-space:nowrap}
.app-header .chapter-name{color:#8b949e;font-size:.82rem}

.toolbar{
  background:#161b22;padding:6px 16px;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap;
}

.main-area{display:flex;flex:1;overflow:hidden}
.editor-pane{flex:1;overflow-y:auto;padding:4px 8px 60px}
.preview-pane{
  width:380px;border-left:1px solid #30363d;display:flex;flex-direction:column;
  background:#0d1117;flex-shrink:0;
}

.footer{
  background:#161b22;border-top:1px solid #30363d;
  padding:4px 16px;display:flex;align-items:center;gap:12px;
  font-size:.78rem;color:#484f58;flex-shrink:0;
}

/* ══ Buttons ════════════════════════════════════════ */
.btn{
  padding:4px 12px;border:1px solid #30363d;border-radius:6px;
  background:#21262d;color:#c9d1d9;font-size:.8rem;
  transition:all .12s;white-space:nowrap;
}
.btn:hover{background:#30363d;border-color:#8b949e}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-red{background:#da3633;border-color:#f85149;color:#fff}
.btn-red:hover{background:#f85149}
.btn-blue{background:#1f6feb;border-color:#388bfd;color:#fff}
.btn-blue:hover{background:#388bfd}

/* ══ Tabs ═══════════════════════════════════════════ */
.tabs{display:flex;gap:2px;margin-right:8px}
.tab{
  padding:4px 14px;border:1px solid #30363d;border-radius:6px 6px 0 0;
  background:#0d1117;color:#8b949e;font-size:.82rem;transition:all .12s;
}
.tab:hover{color:#c9d1d9}
.tab.active{background:#ff6b6b;color:#fff;border-color:#ff6b6b;font-weight:600}
.spacer{flex:1}

/* ══ File Selector ══════════════════════════════════ */
.file-select{
  background:#0d1117;color:#c9d1d9;border:1px solid #30363d;
  border-radius:6px;padding:3px 8px;font-size:.82rem;
}

/* ══ Loading Screen ═════════════════════════════════ */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:16px;color:#8b949e;
}
.loading .spinner{
  width:40px;height:40px;border:3px solid #30363d;
  border-top-color:#ff6b6b;border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ Event Rows ═════════════════════════════════════ */
.ev-row{
  display:flex;align-items:center;gap:4px;
  padding:4px 6px;margin:1px 0;border-radius:4px;
  min-height:34px;transition:filter .1s;
}
.ev-row:hover{filter:brightness(1.2)}
.ev-row .grip{cursor:grab;color:#30363d;user-select:none;padding:0 2px;font-size:.9rem;flex-shrink:0}
.ev-row .grip:hover{color:#8b949e}
.ev-row .num{width:28px;text-align:right;color:#484f58;font-size:.72rem;flex-shrink:0;font-variant-numeric:tabular-nums}
.ev-row .tag{width:72px;font-size:.72rem;font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.ev-row .fields{flex:1;display:flex;align-items:center;gap:4px;min-width:0}
.ev-row .acts{display:flex;gap:2px;flex-shrink:0}

.fi{background:rgba(0,0,0,.4);border:1px solid #30363d;color:#c9d1d9;padding:3px 6px;border-radius:4px;font-size:.82rem}
.fi:focus{outline:none;border-color:#ff6b6b}
.fi.grow{flex:1;min-width:40px}
.fi.w80{width:80px}
.fi.w60{width:60px}
.fl{color:#484f58;font-size:.72rem;flex-shrink:0}

.ab{
  width:24px;height:24px;border:none;border-radius:4px;
  background:rgba(255,255,255,.04);color:#484f58;font-size:.75rem;
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.ab:hover{background:rgba(255,255,255,.1);color:#c9d1d9}
.ab.x:hover{background:#da3633;color:#fff}

/* Row type colors */
.r-say{background:rgba(255,166,0,.12)}.r-say .tag{color:#ffa600}
.r-say_clear{background:rgba(255,140,0,.07)}.r-say_clear .tag{color:#cc8800}
.r-chat{background:rgba(56,139,253,.12)}.r-chat .tag{color:#58a6ff}
.r-wait{background:rgba(139,148,158,.08)}.r-wait .tag{color:#8b949e}
.r-rot_y{background:rgba(63,185,80,.1)}.r-rot_y .tag{color:#3fb950}
.r-head_x{background:rgba(63,185,80,.07)}.r-head_x .tag{color:#2ea043}
.r-pos_z{background:rgba(63,185,80,.12)}.r-pos_z .tag{color:#56d364}
.r-pos_z_await{background:rgba(63,185,80,.07)}.r-pos_z_await .tag{color:#3fb950}
.r-walk_set{background:rgba(210,210,0,.08)}.r-walk_set .tag{color:#d2a800}
.r-flashlight_on{background:rgba(255,220,0,.1)}.r-flashlight_on .tag{color:#e3b341}

.empty-msg{text-align:center;color:#484f58;padding:32px;font-size:.9rem}

/* drag */
.ev-row.dragging{opacity:.3}
.ev-row.dt{border-top:2px solid #ff6b6b}
.ev-row.db{border-bottom:2px solid #ff6b6b}

/* ══ Preview ════════════════════════════════════════ */
.pv-header{
  padding:8px 12px;background:#161b22;border-bottom:1px solid #30363d;
  display:flex;align-items:center;gap:8px;
}
.pv-header .title{font-size:.82rem;color:#8b949e;flex:1}
.pv-viewport{flex:1;overflow-y:auto;position:relative;background:#000}
.pv-screen{
  padding:12px;display:flex;gap:8px;min-height:100%;
}
.pv-game{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:20px}
.pv-subtitle{
  background:rgba(0,0,0,.75);color:#fff;padding:8px 12px;border-radius:4px;
  font-size:.85rem;line-height:1.5;display:none;
}
.pv-chat-area{width:160px;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;overflow:hidden}
.pv-chat-msg{font-size:.7rem;line-height:1.3;padding:2px 0}
.pv-chat-msg .un{font-weight:600;margin-right:4px}
.pv-controls{
  padding:6px 12px;background:#161b22;border-top:1px solid #30363d;
  display:flex;align-items:center;gap:6px;
}
.pv-time{font-size:.75rem;color:#484f58;font-variant-numeric:tabular-nums}

/* ══ Toast ══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  background:#238636;color:#fff;padding:8px 20px;border-radius:8px;
  font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
}
.toast.show{opacity:1}

/* ══ More Menu ══════════════════════════════════════ */
.menu{
  display:none;position:fixed;background:#161b22;border:1px solid #30363d;
  border-radius:8px;padding:4px 0;z-index:99;min-width:180px;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
}
.menu button{
  display:block;width:100%;text-align:left;padding:6px 14px;
  background:none;border:none;color:#c9d1d9;font-size:.82rem;
}
.menu button:hover{background:#30363d}

/* ══ Firebase Status ════════════════════════════════ */
.fb-badge{
  font-size:.7rem;padding:2px 8px;border-radius:10px;
  background:#30363d;color:#8b949e;
}
.fb-badge.on{background:#238636;color:#fff}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────── -->
<div class="app-header">
  <h1>REC:OFF:AIR</h1>
  <select class="file-select" id="fileSelect"></select>
  <span class="chapter-name" id="chapterName"></span>
  <div class="spacer"></div>
  <span class="fb-badge" id="fbBadge">Firebase: OFF</span>
</div>

<!-- ── Toolbar ────────────────────────────── -->
<div class="toolbar">
  <div class="tabs">
    <button class="tab active" data-mode="all">すべて</button>
    <button class="tab" data-mode="say">セリフのみ</button>
    <button class="tab" data-mode="chat">チャットのみ</button>
  </div>
  <button class="btn" id="addSay">+ セリフ</button>
  <button class="btn" id="addChat">+ チャット</button>
  <button class="btn" id="addWait">+ 待機</button>
  <button class="btn" id="addMore">+ その他 ▾</button>
  <div class="spacer"></div>
  <span id="countInfo" style="font-size:.78rem;color:#484f58"></span>
  <button class="btn" id="btnCopy" title="JSONをクリップボードにコピー">📋 コピー</button>
  <button class="btn btn-primary" id="btnDL">💾 ダウンロード</button>
  <button class="btn" id="btnFile">📂 ファイルから開く</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<!-- ── Main ───────────────────────────────── -->
<div class="main-area">
  <div class="editor-pane" id="editorPane">
    <div class="loading" id="loadingView">
      <div class="spinner"></div>
      <div>GitHubからデータを読み込み中…</div>
    </div>
  </div>
  <div class="preview-pane" id="previewPane">
    <div class="pv-header">
      <span class="title">プレビュー</span>
      <button class="btn" id="pvToggle" style="font-size:.75rem">◀ 閉じる</button>
    </div>
    <div class="pv-viewport">
      <div class="pv-screen">
        <div class="pv-game">
          <div class="pv-subtitle" id="pvSub"></div>
        </div>
        <div class="pv-chat-area" id="pvChat"></div>
      </div>
    </div>
    <div class="pv-controls">
      <button class="btn" id="pvPlay">▶ 再生</button>
      <button class="btn" id="pvStop">■ 停止</button>
      <span class="pv-time" id="pvTime">0:00</span>
      <div class="spacer"></div>
      <label style="font-size:.75rem;color:#484f58">
        <input type="range" id="pvSpeed" min="0.5" max="3" step="0.5" value="1" style="width:60px">
        <span id="pvSpeedLabel">1x</span>
      </label>
    </div>
  </div>
</div>

<!-- ── Footer ─────────────────────────────── -->
<div class="footer">
  <span id="statusMsg">起動中…</span>
  <div class="spacer"></div>
  <span>Ctrl+S 保存 / Ctrl+Z 元に戻す</span>
</div>

<!-- ── More Menu ──────────────────────────── -->
<div class="menu" id="moreMenu">
  <button data-add="say_clear">say_clear（セリフ消去）</button>
  <button data-add="rot_y">rot_y（左右回転）</button>
  <button data-add="head_x">head_x（上下首振り）</button>
  <button data-add="pos_z">pos_z（前後移動）</button>
  <button data-add="pos_z_await">pos_z_await（移動完了待ち）</button>
  <button data-add="walk_set">walk_set（歩行切替）</button>
  <button data-add="flashlight_on">flashlight_on（ライトON）</button>
</div>

<!-- ── Toast ──────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// Config
// ══════════════════════════════════════════════════════
const REPO_OWNER = 'Alicetel-u';
const REPO_NAME  = 'REC-OFF-AIR';
const BRANCH     = 'master';
const DIALOGUE_DIR = 'dialogue';

// Firebase config — fill in to enable real-time sync
const FIREBASE_CONFIG = null;
/*  Example:
const FIREBASE_CONFIG = {
  apiKey: "...",
  authDomain: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};
*/

// ══════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════
let data = null;
let events = [];
let currentMode = 'all';
let dirty = false;
let loadedFileName = '';
let undoStack = [];
let db = null; // Firestore ref

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ══════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════
(async function init() {
  initFirebase();
  await loadFileList();
  bindEvents();
})();

// ══════════════════════════════════════════════════════
// Firebase
// ══════════════════════════════════════════════════════
function initFirebase() {
  if (!FIREBASE_CONFIG) return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    firebase.auth().signInAnonymously();
    $('#fbBadge').textContent = 'Firebase: ON';
    $('#fbBadge').classList.add('on');
  } catch (e) {
    console.warn('Firebase init failed:', e);
  }
}

async function fbSave(fileName, data) {
  if (!db) return;
  try {
    await db.collection('dialogues').doc(fileName).set({
      data: JSON.stringify(data),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Firebase save failed:', e); }
}

async function fbLoad(fileName) {
  if (!db) return null;
  try {
    const doc = await db.collection('dialogues').doc(fileName).get();
    if (doc.exists) return JSON.parse(doc.data().data);
  } catch (e) { console.warn('Firebase load failed:', e); }
  return null;
}

function fbListen(fileName, callback) {
  if (!db) return;
  db.collection('dialogues').doc(fileName).onSnapshot(snap => {
    if (snap.exists && !dirty) {
      try {
        const d = JSON.parse(snap.data().data);
        callback(d);
      } catch (e) {}
    }
  });
}

// ══════════════════════════════════════════════════════
// GitHub API
// ══════════════════════════════════════════════════════
async function ghFetch(path) {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  return res.json();
}

async function ghRaw(path) {
  const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${path}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Fetch failed ${res.status}`);
  return res.json();
}

// ══════════════════════════════════════════════════════
// File List
// ══════════════════════════════════════════════════════
async function loadFileList() {
  const sel = $('#fileSelect');
  try {
    const files = await ghFetch(DIALOGUE_DIR);
    const jsons = files.filter(f => f.name.endsWith('.json'));
    jsons.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = f.name.replace('.json', '');
      sel.appendChild(opt);
    });
    if (jsons.length > 0) {
      await loadDialogue(jsons[0].name);
    } else {
      setStatus('dialogue/ にJSONファイルがありません');
      $('#loadingView').innerHTML = '<div class="empty-msg">dialogue/ にJSONファイルがありません</div>';
    }
  } catch (e) {
    console.error(e);
    setStatus('GitHub接続エラー — ファイルから読み込んでください');
    $('#loadingView').innerHTML = `
      <div class="empty-msg">
        GitHubに接続できません<br><br>
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
          📂 ローカルファイルを開く
        </button>
      </div>`;
  }
}

async function loadDialogue(fileName) {
  loadedFileName = fileName;
  setStatus('読み込み中…');

  // Try Firebase first, then GitHub
  let loaded = await fbLoad(fileName);
  if (!loaded) {
    try { loaded = await ghRaw(`${DIALOGUE_DIR}/${fileName}`); }
    catch (e) { setStatus('読み込みエラー: ' + e.message); return; }
  }

  applyData(loaded, fileName);

  // Listen for real-time updates
  fbListen(fileName, d => { applyData(d, fileName); toast('リアルタイム更新を受信'); });
}

function applyData(d, fileName) {
  data = d;
  events = data.events || [];
  dirty = false;
  undoStack = [];
  loadedFileName = fileName;
  $('#chapterName').textContent = data.chapter || '';
  $('#loadingView')?.remove();
  render();
  setStatus(`${fileName} — ${events.length}件`);
  saveLocal();
}

// ══════════════════════════════════════════════════════
// Local Storage
// ══════════════════════════════════════════════════════
function saveLocal() {
  try {
    localStorage.setItem('recoffair_editor_' + loadedFileName, JSON.stringify({
      data, dirty, ts: Date.now()
    }));
  } catch (e) {}
}

function loadLocal(fileName) {
  try {
    const s = localStorage.getItem('recoffair_editor_' + fileName);
    if (s) {
      const o = JSON.parse(s);
      if (o.dirty && Date.now() - o.ts < 86400000) return o.data;
    }
  } catch (e) {}
  return null;
}

// ══════════════════════════════════════════════════════
// Rendering
// ══════════════════════════════════════════════════════
function render() {
  const pane = $('#editorPane');
  pane.innerHTML = '';

  const filtered = events.map((ev, i) => ({ ev, i })).filter(({ ev }) => {
    if (currentMode === 'all') return true;
    return ev.type === currentMode;
  });

  if (filtered.length === 0) {
    pane.innerHTML = `<div class="empty-msg">${
      currentMode === 'say' ? 'セリフ（say）がありません' :
      currentMode === 'chat' ? 'チャット（chat）がありません' :
      'イベントがありません'
    }</div>`;
    updateInfo();
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach(({ ev, i }) => frag.appendChild(makeRow(ev, i)));
  pane.appendChild(frag);
  updateInfo();
}

function makeRow(ev, ri) {
  const row = document.createElement('div');
  row.className = `ev-row r-${ev.type||'unknown'}`;
  row.dataset.idx = ri;

  const grip = ce('span','grip','⠿');
  grip.draggable = true;
  grip.addEventListener('dragstart', onDS);
  grip.addEventListener('dragend', onDE);
  row.addEventListener('dragover', onDO);
  row.addEventListener('dragleave', onDL);
  row.addEventListener('drop', onDD);

  const num = ce('span','num',String(ri+1));
  const tag = ce('span','tag',ev.type||'?');
  const fields = ce('div','fields');
  buildFields(fields, ev, ri);

  const acts = ce('div','acts');
  if (currentMode === 'all') {
    acts.appendChild(ab('▲',()=>move(ri,-1)));
    acts.appendChild(ab('▼',()=>move(ri,1)));
  }
  acts.appendChild(ab('✕',()=>del(ri),true));

  row.append(grip,num,tag,fields,acts);
  return row;
}

function buildFields(c, ev, i) {
  switch (ev.type) {
    case 'say':
      c.appendChild(fi(i,'text',ev.text||'','セリフを入力…',true));
      break;
    case 'chat':
      c.appendChild(fi(i,'msg',ev.msg||'','メッセージ…',true));
      c.appendChild(fl('user:'));
      c.appendChild(fi(i,'user',ev.user||'','ユーザー名',false,'w80'));
      break;
    case 'wait':
      c.appendChild(fn(i,'sec',ev.sec??0.5,0,30,0.1));
      c.appendChild(fl('秒'));
      break;
    case 'rot_y': case 'head_x':
      c.appendChild(fl('target:')); c.appendChild(fn(i,'target',ev.target??0,-6.28,6.28,0.01));
      c.appendChild(fl('dur:')); c.appendChild(fn(i,'dur',ev.dur??1,0.05,30,0.05));
      c.appendChild(fl('秒'));
      break;
    case 'pos_z':
      c.appendChild(fl('target:')); c.appendChild(fn(i,'target',ev.target??0,-200,200,0.5));
      c.appendChild(fl('dur:')); c.appendChild(fn(i,'dur',ev.dur??5,0.1,60,0.1));
      c.appendChild(fl('秒')); c.appendChild(fl('id:'));
      c.appendChild(fi(i,'id',ev.id||'','walk1',false,'w60'));
      break;
    case 'pos_z_await':
      c.appendChild(fl('id:')); c.appendChild(fi(i,'id',ev.id||'','walk1',false,'w80'));
      break;
    case 'walk_set': {
      const s = document.createElement('select');
      s.className = 'fi';
      s.innerHTML = `<option value="true"${ev.on?' selected':''}>ON（歩行）</option><option value="false"${!ev.on?' selected':''}>OFF（停止）</option>`;
      s.addEventListener('change', () => { pushUndo(); events[i].on = s.value==='true'; markDirty(); });
      c.appendChild(s);
      break;
    }
    default:
      c.appendChild(fl('（パラメータなし）'));
  }
}

// ══════════════════════════════════════════════════════
// DOM Helpers
// ══════════════════════════════════════════════════════
function ce(tag,cls,txt) { const e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; }
function fl(t) { return ce('span','fl',t); }
function fi(i,key,val,ph,grow,extra) {
  const inp = document.createElement('input'); inp.type='text';
  inp.className='fi'+(grow?' grow':'')+(extra?' '+extra:'');
  inp.value=val; inp.placeholder=ph;
  inp.addEventListener('input', () => { pushUndo(); events[i][key]=inp.value; markDirty(); });
  return inp;
}
function fn(i,key,val,mn,mx,step) {
  const inp = document.createElement('input'); inp.type='number';
  inp.className='fi w60'; inp.value=val; inp.min=mn; inp.max=mx; inp.step=step;
  inp.addEventListener('input', () => {
    const v=parseFloat(inp.value); if(!isNaN(v)){pushUndo();events[i][key]=v;markDirty();}
  });
  return inp;
}
function ab(label,cb,isDel) {
  const b = document.createElement('button');
  b.className='ab'+(isDel?' x':''); b.textContent=label;
  b.addEventListener('click',cb); return b;
}

// ══════════════════════════════════════════════════════
// Event Ops
// ══════════════════════════════════════════════════════
function move(i,d) {
  const n=i+d; if(n<0||n>=events.length)return;
  pushUndo();
  [events[i],events[n]]=[events[n],events[i]];
  markDirty(); render();
}
function del(i) {
  pushUndo(); events.splice(i,1); markDirty(); render();
}
function add(ev) {
  pushUndo();
  if (currentMode!=='all') {
    let last=-1; events.forEach((e,i)=>{if(e.type===currentMode)last=i;});
    events.splice(last>=0?last+1:events.length, 0, ev);
  } else { events.push(ev); }
  markDirty(); render();
  $('#editorPane').scrollTop = $('#editorPane').scrollHeight;
}

function newEv(type) {
  const map = {
    say:{type:'say',text:''},
    chat:{type:'chat',msg:'',user:'',utype:''},
    wait:{type:'wait',sec:0.5},
    say_clear:{type:'say_clear'},
    rot_y:{type:'rot_y',target:0,dur:1},
    head_x:{type:'head_x',target:0,dur:1},
    pos_z:{type:'pos_z',target:0,dur:5,id:'walk1'},
    pos_z_await:{type:'pos_z_await',id:'walk1'},
    walk_set:{type:'walk_set',on:true},
    flashlight_on:{type:'flashlight_on'},
  };
  return JSON.parse(JSON.stringify(map[type]||{type}));
}

// ══════════════════════════════════════════════════════
// Undo
// ══════════════════════════════════════════════════════
function pushUndo() {
  undoStack.push(JSON.stringify(events));
  if (undoStack.length > 50) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  events = JSON.parse(undoStack.pop());
  data.events = events;
  markDirty(); render();
  toast('元に戻しました');
}

// ══════════════════════════════════════════════════════
// Drag Reorder
// ══════════════════════════════════════════════════════
let dragIdx = null;
function onDS(e){const r=e.target.closest('.ev-row');dragIdx=+r.dataset.idx;r.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','');}
function onDE(){dragIdx=null;$$('.ev-row').forEach(r=>r.classList.remove('dragging','dt','db'));}
function onDO(e){e.preventDefault();if(dragIdx===null)return;const r=e.target.closest('.ev-row');if(!r)return;const rect=r.getBoundingClientRect(),mid=rect.top+rect.height/2;r.classList.remove('dt','db');r.classList.add(e.clientY<mid?'dt':'db');}
function onDL(e){const r=e.target.closest('.ev-row');if(r)r.classList.remove('dt','db');}
function onDD(e){e.preventDefault();if(dragIdx===null)return;const r=e.target.closest('.ev-row');if(!r)return;let ti=+r.dataset.idx;const rect=r.getBoundingClientRect();if(e.clientY>=rect.top+rect.height/2)ti++;if(dragIdx===ti||dragIdx+1===ti){onDE();return;}pushUndo();const[rm]=events.splice(dragIdx,1);events.splice(ti>dragIdx?ti-1:ti,0,rm);markDirty();render();}

// ══════════════════════════════════════════════════════
// Save / Export
// ══════════════════════════════════════════════════════
function exportJSON() {
  data.events = events;
  return JSON.stringify(data, null, '\t');
}

function downloadJSON() {
  const blob = new Blob([exportJSON()], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = loadedFileName || 'dialogue.json';
  a.click(); URL.revokeObjectURL(a.href);
  dirty = false;
  setStatus('保存しました — ' + loadedFileName);
  toast('ダウンロード完了');
}

async function copyJSON() {
  try {
    await navigator.clipboard.writeText(exportJSON());
    toast('クリップボードにコピーしました');
  } catch { toast('コピーに失敗しました'); }
}

function loadFromFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.events) { alert('"events" がありません'); return; }
      applyData(d, file.name);
      toast(file.name + ' を読み込みました');
    } catch (err) { alert('JSONエラー: '+err.message); }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════
function markDirty() {
  dirty = true;
  data.events = events;
  setStatus('● 未保存の変更');
  saveLocal();
  if (db) fbSave(loadedFileName, data);
}
function setStatus(msg) {
  const el=$('#statusMsg'); el.textContent=msg;
  el.style.color = dirty ? '#e3b341' : '#484f58';
}
function updateInfo() {
  const s=events.filter(e=>e.type==='say').length;
  const c=events.filter(e=>e.type==='chat').length;
  $('#countInfo').textContent=`全${events.length} / セリフ${s} / チャット${c}`;
}
function toast(msg,dur=2000) {
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ══════════════════════════════════════════════════════
// Preview
// ══════════════════════════════════════════════════════
let pvTimer = null;
let pvIdx = 0;
let pvTime = 0;

function pvPlay() {
  pvStop();
  pvIdx = 0; pvTime = 0;
  $('#pvChat').innerHTML = '';
  $('#pvSub').style.display = 'none';
  $('#pvSub').textContent = '';

  const speed = parseFloat($('#pvSpeed').value) || 1;
  pvTimer = setInterval(() => pvTick(speed), 50);
  toast('プレビュー再生中');
}

function pvStop() {
  if (pvTimer) { clearInterval(pvTimer); pvTimer = null; }
}

function pvTick(speed) {
  pvTime += 0.05 * speed;
  $('#pvTime').textContent = formatTime(pvTime);

  while (pvIdx < events.length) {
    const ev = events[pvIdx];
    if (ev.type === 'wait') {
      ev._acc = (ev._acc || 0) + 0.05 * speed;
      if (ev._acc < ev.sec) return;
      ev._acc = 0;
      pvIdx++;
      continue;
    }
    if (ev.type === 'say') {
      const sub = $('#pvSub');
      sub.textContent = ev.text;
      sub.style.display = 'block';
    } else if (ev.type === 'say_clear') {
      $('#pvSub').style.display = 'none';
    } else if (ev.type === 'chat') {
      const area = $('#pvChat');
      const m = document.createElement('div');
      m.className = 'pv-chat-msg';
      const colors = ['#1e88e5','#43a047','#e53935','#8e24aa','#f4511e','#00acc1'];
      const color = colors[Math.abs(hashStr(ev.user||''))%colors.length];
      m.innerHTML = `<span class="un" style="color:${color}">${esc(ev.user||'匿名')}</span>${esc(ev.msg||'')}`;
      area.appendChild(m);
      if (area.children.length > 30) area.removeChild(area.firstChild);
      area.scrollTop = area.scrollHeight;
    }
    pvIdx++;
    break;
  }

  if (pvIdx >= events.length) { pvStop(); toast('プレビュー終了'); }
}

function formatTime(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function hashStr(s) { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ══════════════════════════════════════════════════════
// Bind Events
// ══════════════════════════════════════════════════════
function bindEvents() {
  // Tabs
  $$('.tab').forEach(t => t.addEventListener('click', () => {
    $$('.tab').forEach(b=>b.classList.remove('active'));
    t.classList.add('active');
    currentMode = t.dataset.mode;
    render();
  }));

  // Add buttons
  $('#addSay').addEventListener('click', ()=>add(newEv('say')));
  $('#addChat').addEventListener('click', ()=>add(newEv('chat')));
  $('#addWait').addEventListener('click', ()=>add(newEv('wait')));

  // More menu
  const menu = $('#moreMenu');
  $('#addMore').addEventListener('click', e => {
    const r=e.target.getBoundingClientRect();
    menu.style.display='block'; menu.style.left=r.left+'px'; menu.style.top=(r.bottom+4)+'px';
  });
  document.addEventListener('click', e => {
    if(!e.target.closest('#addMore')&&!e.target.closest('#moreMenu')) menu.style.display='none';
  });
  menu.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    add(newEv(b.dataset.add)); menu.style.display='none';
  }));

  // Save / Load
  $('#btnDL').addEventListener('click', downloadJSON);
  $('#btnCopy').addEventListener('click', copyJSON);
  $('#btnFile').addEventListener('click', () => $('#fileInput').click());
  $('#fileInput').addEventListener('change', () => {
    if($('#fileInput').files.length) loadFromFile($('#fileInput').files[0]);
  });

  // File select
  $('#fileSelect').addEventListener('change', async () => {
    if (dirty && !confirm('未保存の変更があります。切り替えますか？')) {
      $('#fileSelect').value = loadedFileName; return;
    }
    await loadDialogue($('#fileSelect').value);
  });

  // Preview
  $('#pvPlay').addEventListener('click', pvPlay);
  $('#pvStop').addEventListener('click', pvStop);
  $('#pvSpeed').addEventListener('input', () => {
    $('#pvSpeedLabel').textContent = $('#pvSpeed').value + 'x';
  });

  // Preview toggle
  let pvOpen = true;
  $('#pvToggle').addEventListener('click', () => {
    pvOpen = !pvOpen;
    $('#previewPane').style.display = pvOpen ? 'flex' : 'none';
    $('#pvToggle').textContent = pvOpen ? '◀ 閉じる' : '▶ プレビュー';
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); downloadJSON(); }
    if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); }
  });

  // Drag & drop file
  document.body.addEventListener('dragover', e=>e.preventDefault());
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.json')) {
      if (!dirty || confirm('未保存の変更があります。読み込みますか？')) loadFromFile(f);
    }
  });

  // Warn on close
  window.addEventListener('beforeunload', e => { if(dirty){e.preventDefault();e.returnValue='';} });
}
</script>
</body>
</html>
