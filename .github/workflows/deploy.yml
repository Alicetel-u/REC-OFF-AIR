name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate voice assets
        run: |
          echo "=== WAV/import 整合性チェック ==="
          errors=0
          for wav in assets/audio/voice/ch01/*.wav; do
            [ -f "$wav" ] || continue
            import="${wav}.import"
            if [ ! -f "$import" ]; then
              echo "ERROR: ${import} が存在しません"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "ERROR: ${errors}件の.importファイルが不足しています"
            exit 1
          fi
          echo "OK: 全WAVに.importファイルあり"

      - name: Validate dialogue JSON
        run: |
          python tools/fix_voice_wait.py --validate-only
          # CONSECUTIVE_WAIT / LONG_GAP / MISSING_WAV は致命的
          output=$(python tools/fix_voice_wait.py --validate-only 2>&1)
          if echo "$output" | grep -qE "CONSECUTIVE_WAIT|MISSING_WAV"; then
            echo "ERROR: 致命的なバリデーション警告があります"
            echo "$output" | grep -E "CONSECUTIVE_WAIT|MISSING_WAV"
            exit 1
          fi
          echo "OK: バリデーション通過"

  export-and-deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates/4.6.1.stable
          key: godot-4.6.1-${{ runner.os }}

      - name: Install Godot 4.6.1
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.1-stable_linux.x86_64
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install Web export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip -q Godot_v4.6.1-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Write export presets
        run: |
          cat > export_presets.cfg << 'PRESETEOF'
          [preset.0]

          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter="assets/models/characters/female/Character_Female_*.fbx, assets/models/characters/female/Character_19_*.fbx, assets/models/characters/female/Character_20_*.fbx, assets/models/characters/female/Character_21_*.fbx, assets/models/characters/female/Character_22_*.fbx, assets/models/characters/female/Character_25_*.fbx, assets/models/characters/female/Character_26_*.fbx, assets/models/characters/female/Character_27_*.fbx, assets/models/characters/female/Character_28_*.fbx, assets/models/characters/female/Character_31_*.fbx, assets/models/characters/female/Character_32_*.fbx, assets/models/characters/female/Character_33_*.fbx, assets/textures/characters/Character_Female_*.png, assets/textures/characters/Character_19_*.png, assets/textures/characters/Character_20_*.png, assets/textures/characters/Character_21_*.png, assets/textures/characters/Character_22_*.png, assets/textures/characters/Character_25_*.png, assets/textures/characters/Character_26_*.png, assets/textures/characters/Character_27_*.png, assets/textures/characters/Character_28_*.png, assets/textures/characters/Character_31_*.png, assets/textures/characters/Character_32_*.png, assets/textures/characters/Character_33_*.png, assets/models/characters/killers/*, assets/textures/characters/Character_Killer*, assets/textures/characters/Character_Monster*, assets/video/bus_arrival.ogv, assets/video/bus_arrival.webm, assets/video/bus_arrival_audio.ogg"
          export_path="web/index.html"
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          PRESETEOF

      - name: Install Japanese fonts
        run: |
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p assets/fonts
          find /usr/share/fonts -name "NotoSansCJK-Regular.ttc" | head -1 | xargs -I{} cp {} assets/fonts/NotoSansCJK-Regular.ttc

      - name: Web export
        run: |
          mkdir -p web
          godot --headless --path . --export-release "Web" web/index.html
          touch web/.nojekyll
          echo "=== Export completed ==="
          ls -lh web/index.pck 2>/dev/null || echo "WARNING: PCK not found!"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
